<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Goa Social Test</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
padding:20px;
}

.card{
background:#111;
border-radius:10px;
margin-bottom:20px;
overflow:hidden;
}

img{
width:100%;
display:block;
}

.channel{
margin-top:40px;
font-size:20px;
color:#ff7b42;
}

</style>

</head>
<body>

<h2>Goa Channels Test Feed</h2>

<div id="feed"></div>

<script>

const API_KEY = "AIzaSyDGHXHuPiHAfJGin_c2-LF4FZ5IBMYLNK4"

const channels = [

{
name:"RDX Goa",
id:"UCmZFYpP2pF1rPqY9w2LrX0A"
},

{
name:"Alert Goans",
id:"UCnqJ7QJQ6pF6F3s7zC4n0uA"
},

{
name:"In Goa News",
id:"UCq8qCk5S2X1d4o6d9qQ8X9Q"
},

{
name:"Goa365 TV",
id:"UC4Vv6Nq0eQF8i3v5s9c0n1A"
},

{
name:"Dainik Gomantak TV",
id:"UCZk7V2p9t0b0f4l6x8o9n5A"
}

]

async function loadVideos(){

let container = document.getElementById("feed")

for(let channel of channels){

container.innerHTML += `<div class="channel">${channel.name}</div>`

let url = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channel.id}&maxResults=4&order=date&type=video&key=${API_KEY}`

let res = await fetch(url)

let data = await res.json()

data.items.forEach(video=>{

let id = video.id.videoId
let thumb = video.snippet.thumbnails.high.url
let title = video.snippet.title

container.innerHTML += `

<div class="card">

<div onclick="playVideo('${id}',this)">

<img src="${thumb}">

</div>

<div style="padding:10px">${title}</div>

</div>

`

})

}

}

function playVideo(id,el){

el.innerHTML = `

<iframe
width="100%"
height="220"
src="https://www.youtube.com/embed/${id}?autoplay=1"
frameborder="0"
allowfullscreen>
</iframe>

`

}

loadVideos()

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Goa Social Feed</title>

<style>

body{
margin:0;
background:black;
overflow-y:scroll;
scroll-snap-type:y mandatory;
height:100vh;
font-family:Arial;
}

.feed{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

.video{
height:100vh;
scroll-snap-align:start;
position:relative;
}

iframe{
width:100%;
height:100%;
border:none;
}

.sound{
position:absolute;
bottom:20px;
right:20px;
background:rgba(0,0,0,0.5);
color:white;
padding:10px;
border-radius:50%;
font-size:20px;
cursor:pointer;
}

</style>

</head>
<body>

<div class="feed" id="feed"></div>

<script>

const API_KEY="AIzaSyDGHXHuPiHAfJGin_c2-LF4FZ5IBMYLNK4"

const channels=[
"UCJb1MeQClvGeSMeBSVLKnDQ"
]

let videos=[]
let players=[]

async function loadVideos(){

let feed=document.getElementById("feed")

for(let channel of channels){

let url=`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channel}&maxResults=6&order=date&type=video&key=${API_KEY}`

let res=await fetch(url)

let data=await res.json()

data.items.forEach(v=>{

videos.push(v.id.videoId)

})

}

videos.forEach(id=>{

feed.innerHTML+=`

<div class="video">

<iframe
src="https://www.youtube.com/embed/${id}?enablejsapi=1&mute=1&autoplay=1&controls=0&loop=1&playlist=${id}"
allow="autoplay"
></iframe>

<div class="sound" onclick="toggleSound(this)">🔊</div>

</div>

`

})

observe()

}

function toggleSound(btn){

let iframe=btn.parentElement.querySelector("iframe")

iframe.src=iframe.src.replace("mute=1","mute=0")

}

function observe(){

let frames=document.querySelectorAll("iframe")

let observer=new IntersectionObserver(entries=>{

entries.forEach(entry=>{

let frame=entry.target

if(entry.isIntersecting){

frame.src=frame.src.replace("autoplay=0","autoplay=1")

}else{

frame.src=frame.src.replace("autoplay=1","autoplay=0")

}

})

},{threshold:0.6})

frames.forEach(f=>observer.observe(f))

}

loadVideos()

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Goa Social Video Feed</title>

<style>

body{
margin:0;
background:#000;
font-family:Arial;
overflow-y:scroll;
scroll-snap-type:y mandatory;
height:100vh;
}

.feed{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

.video-card{

height:100vh;
scroll-snap-align:start;
position:relative;

display:flex;
align-items:center;
justify-content:center;

background:#000;

}

iframe{
width:100%;
height:100%;
border:none;
}

.title{

position:absolute;
bottom:20px;
left:15px;
color:white;
font-size:16px;
background:rgba(0,0,0,0.5);
padding:6px 10px;
border-radius:5px;

}

</style>

</head>
<body>

<div class="feed" id="feed"></div>

<script>

const API_KEY="AIzaSyDGHXHuPiHAfJGin_c2-LF4FZ5IBMYLNK4"

/* CHANNEL IDs */

const channels=[

"UCJb1MeQClvGeSMeBSVLKnDQ",  // Prudent Media Goa
"UC4pFJfN4m7c4kZkz6o5L2qQ",  // Goa365
"UCxLJj3bY8Q1pXg8s2T5Y4Dw"   // RDX Goa

]

async function loadVideos(){

let feed=document.getElementById("feed")

let videos=[]

for(let channel of channels){

let url=`https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channel}&maxResults=5&order=date&type=video&key=${API_KEY}`

let res=await fetch(url)

let data=await res.json()

data.items.forEach(v=>{

videos.push({

id:v.id.videoId,
title:v.snippet.title

})

})

}

/* sort newest first */

videos.sort((a,b)=>0.5-Math.random())

videos.forEach(video=>{

feed.innerHTML+=`

<div class="video-card">

<iframe

src="https://www.youtube.com/embed/${video.id}?autoplay=1&mute=0&controls=0&loop=1&playlist=${video.id}"

allow="autoplay"

></iframe>

<div class="title">${video.title}</div>

</div>

`

})

observeVideos()

}

function observeVideos(){

let videos=document.querySelectorAll("iframe")

let observer=new IntersectionObserver(entries=>{

entries.forEach(entry=>{

let iframe=entry.target

if(entry.isIntersecting){

iframe.src=iframe.src.replace("autoplay=0","autoplay=1")

}else{

iframe.src=iframe.src.replace("autoplay=1","autoplay=0")

}

})

},{threshold:0.6})

videos.forEach(v=>observer.observe(v))

}

loadVideos()

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Goa Social · Mixed Feed</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            line-height: 1.4;
            padding-bottom: 70px; /* space for bottom nav */
        }

        /* Stories / Live row - horizontal scroll */
        .stories-section {
            padding: 12px 16px;
            border-bottom: 1px solid #222;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .section-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
        }

        .section-header a {
            color: #ff8c42;
            font-size: 0.9rem;
            text-decoration: none;
        }

        .stories-scroll {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 4px;
        }

        .stories-scroll::-webkit-scrollbar {
            display: none;
        }

        .story-item {
            min-width: 100px;
            text-align: center;
        }

        .story-avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%; /* Changed from 24px to 50% for circular avatars */
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            position: relative;
            overflow: hidden;
            margin-bottom: 8px;
            border: 2px solid #ff8c42;
        }

        .story-avatar.live::after {
            content: 'LIVE';
            position: absolute;
            bottom: 4px;
            right: 4px;
            background: #ff0000;
            color: white;
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 12px;
            font-weight: bold;
        }

        .story-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .story-label {
            font-size: 0.8rem;
            color: #ccc;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Category chips */
        .categories-section {
            padding: 12px 16px;
            border-bottom: 1px solid #222;
        }

        .chips-scroll {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .chips-scroll::-webkit-scrollbar {
            display: none;
        }

        .chip {
            background: #222;
            color: #fff;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            white-space: nowrap;
            border: 1px solid #333;
        }

        .chip.active {
            background: #ff8c42;
            color: #000;
            font-weight: 600;
            border: none;
        }

        /* Feed container */
        .feed-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 0 20px 0;
        }

        /* Feed cards */
        .feed-card {
            background: #111;
            border-radius: 24px;
            margin: 16px 16px 20px 16px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.8);
            border: 1px solid #222;
        }

        /* Card header */
        .card-header {
            display: flex;
            align-items: center;
            padding: 16px;
            gap: 12px;
        }

        .channel-icon {
            width: 44px;
            height: 44px;
            border-radius: 16px;
            background: linear-gradient(145deg, #2b2b2b, #1a1a1a);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #ff8c42;
        }

        .channel-info {
            flex: 1;
        }

        .channel-name {
            font-weight: 600;
            font-size: 1rem;
            color: #fff;
        }

        .post-time {
            font-size: 0.7rem;
            color: #888;
            margin-top: 2px;
        }

        .card-header i {
            color: #888;
            font-size: 1.2rem;
        }

        /* Card content */
        .card-title {
            padding: 0 16px 12px 16px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
        }

        .card-description {
            padding: 0 16px 16px 16px;
            color: #bbb;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* Video container - shorts style */
        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            aspect-ratio: 9/16; /* Shorts format */
            max-height: 500px;
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none; /* Allow autoplay without clicks */
        }

        /* Image placeholder for news/events */
        .image-placeholder {
            width: 100%;
            height: 200px;
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff8c42;
            font-size: 3rem;
        }

        /* Card footer (likes/comments) */
        .card-footer {
            padding: 16px;
            display: flex;
            gap: 24px;
            border-top: 1px solid #222;
            margin-top: 8px;
        }

        .footer-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #888;
            font-size: 0.9rem;
        }

        .footer-item i {
            font-size: 1.1rem;
        }

        .footer-item i.fa-heart { color: #ff5e3a; }
        .footer-item i.fa-comment { color: #4facfe; }

        /* Event card specific */
        .event-details {
            padding: 0 16px 16px 16px;
            display: flex;
            gap: 20px;
            color: #ff8c42;
            font-size: 0.9rem;
        }

        .event-details span i {
            margin-right: 6px;
            color: #888;
        }

        /* Loading indicator */
        .loading-indicator {
            text-align: center;
            padding: 20px;
            color: #ff8c42;
        }

        .loading-indicator i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Bottom navigation (matching your design) */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(18px);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 10px 12px 10px;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #7a7a7a;
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 30px;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .nav-item i {
            font-size: 1.5rem;
            margin-bottom: 2px;
        }

        .nav-item.active {
            color: #ff8c42;
            background: rgba(255, 123, 66, 0.08);
        }

        /* video info overlay */
        .video-info-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px 16px 16px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            color: white;
        }

        .video-title-small {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .video-meta {
            font-size: 0.7rem;
            color: #ccc;
            display: flex;
            gap: 12px;
        }
    </style>
</head>
<body>
    <!-- Stories / Live Section -->
    <div class="stories-section">
        <div class="section-header">
            <h3>LIVE NOW</h3>
            <a href="#">View all <i class="fas fa-chevron-right" style="font-size: 0.7rem;"></i></a>
        </div>
        <div class="stories-scroll" id="liveStories">
            <!-- Will be populated by JS -->
        </div>
    </div>

    <!-- Categories -->
    <div class="categories-section">
        <div class="chips-scroll">
            <span class="chip active">All</span>
            <span class="chip">Trending</span>
            <span class="chip">Local</span>
            <span class="chip">News</span>
            <span class="chip">Videos</span>
            <span class="chip">Events</span>
            <span class="chip">Food</span>
            <span class="chip">Travel</span>
        </div>
    </div>

    <!-- Main Feed Container -->
    <div class="feed-container" id="feedContainer">
        <div class="loading-indicator" id="loading">
            <i class="fas fa-circle-notch"></i>
            <p style="margin-top: 12px;">loading goa feed...</p>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button class="nav-item active" onclick="window.location.href='index.html'">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </button>
        <button class="nav-item" onclick="window.location.href='dating.html'">
            <i class="fas fa-heart"></i>
            <span>Dating</span>
        </button>
        <button class="nav-item" onclick="window.location.href='business.html'">
            <i class="fas fa-store"></i>
            <span>Business</span>
        </button>
        <button class="nav-item" onclick="window.location.href='chats.html'">
            <i class="fas fa-comment-dots"></i>
            <span>Chats</span>
        </button>
        <button class="nav-item" onclick="window.location.href='profile.html'">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </button>
    </nav>

    <script>
        // Configuration
        const API_KEY = 'AIzaSyDGHXHuPiHAfJGin_c2-LF4FZ5IBMYLNK4';
        
        // Mix of content types for the feed
        const channels = [
            { name: 'Prudent Media Goa', id: 'UCn2pEPYpDGeK7CvO3dH0WkA', icon: '📺' },
            { name: 'RDX Goa', id: 'UCAX1AR_JYH8T6uFJ-D44PlA', icon: '🎥' },
            { name: 'Goa365', id: 'UC9CYT9gSNLevX5ey2_6CK0Q', icon: '📰' },
            { name: 'VoxLily', id: 'UCvoxlilyE8Zexample', icon: '🎵' }
        ];

        // Sample community posts (mix)
        const communityPosts = [
            {
                type: 'post',
                author: 'Goa Foodies',
                icon: '🍛',
                time: '2 hours ago',
                title: 'Best Beach Shack Food',
                content: 'Just tried the kingfish at Britto\'s! Absolutely amazing 😋 #goafood #beachlife',
                likes: 234,
                comments: 45,
                image: true
            },
            {
                type: 'event',
                title: 'Goa Carnival 2024',
                venue: 'Panjim City Center',
                date: 'Starting Feb 10',
                price: 'Free Entry',
                attendees: '2.3k interested',
                image: true
            },
            {
                type: 'post',
                author: 'Travel Goa',
                icon: '✈️',
                time: '5 hours ago',
                title: 'Hidden Waterfall Discovered',
                content: 'Found this amazing spot near Netravali. Perfect for monsoon trek! 🏞️',
                likes: 567,
                comments: 89,
                image: true
            }
        ];

        const feedContainer = document.getElementById('feedContainer');
        const liveStories = document.getElementById('liveStories');
        const loadingEl = document.getElementById('loading');

        // Video player manager for autoplay
        class VideoPlayerManager {
            constructor() {
                this.observers = new Map();
                this.setupIntersectionObserver();
            }

            setupIntersectionObserver() {
                this.observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        const iframe = entry.target.querySelector('iframe');
                        if (!iframe) return;

                        if (entry.isIntersecting) {
                            // Play video
                            iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
                            
                            // Unmute after first interaction (if not already)
                            if (iframe.src.includes('mute=1')) {
                                setTimeout(() => {
                                    iframe.src = iframe.src.replace('mute=1', 'mute=0');
                                }, 500);
                            }
                        } else {
                            // Pause video
                            iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
                        }
                    });
                }, { threshold: 0.6 });
            }

            observe(element) {
                this.observer.observe(element);
            }

            unobserve(element) {
                this.observer.unobserve(element);
            }
        }

        const playerManager = new VideoPlayerManager();

        // Format time ago
        function timeAgo(dateString) {
            const now = new Date();
            const published = new Date(dateString);
            const diffMs = now - published;
            const diffHr = Math.floor(diffMs / (1000 * 60 * 60));
            
            if (diffHr < 24) return diffHr + ' hours ago';
            if (diffHr < 48) return 'yesterday';
            return Math.floor(diffHr / 24) + ' days ago';
        }

        // Fetch videos for a channel
        async function fetchChannelVideos(channel) {
            try {
                // First get uploads playlist
                const channelUrl = `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${channel.id}&key=${API_KEY}`;
                const channelRes = await fetch(channelUrl);
                const channelData = await channelRes.json();
                
                if (!channelData.items || !channelData.items[0]) return [];
                
                const uploadsId = channelData.items[0].contentDetails.relatedPlaylists.uploads;
                
                // Get videos from playlist
                const playlistUrl = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${uploadsId}&maxResults=4&key=${API_KEY}`;
                const playlistRes = await fetch(playlistUrl);
                const playlistData = await playlistRes.json();
                
                return playlistData.items.map(item => ({
                    ...channel,
                    type: 'video',
                    videoId: item.snippet.resourceId.videoId,
                    title: item.snippet.title,
                    publishedAt: item.snippet.publishedAt,
                    thumbnail: item.snippet.thumbnails.high?.url
                }));
            } catch (e) {
                console.warn(`Failed for ${channel.name}`, e);
                return [];
            }
        }

        // Create a feed card based on type
        function createFeedCard(item) {
            const card = document.createElement('div');
            card.className = 'feed-card';

            if (item.type === 'video') {
                // Video card (shorts style)
                card.innerHTML = `
                    <div class="card-header">
                        <div class="channel-icon">${item.icon || '📺'}</div>
                        <div class="channel-info">
                            <div class="channel-name">${item.name}</div>
                            <div class="post-time">${timeAgo(item.publishedAt)}</div>
                        </div>
                        <i class="fas fa-ellipsis-h"></i>
                    </div>
                    <div class="video-container" data-video-id="${item.videoId}">
                        <iframe 
                            src="https://www.youtube.com/embed/${item.videoId}?enablejsapi=1&autoplay=0&mute=1&controls=0&playsinline=1&loop=1&playlist=${item.videoId}"
                            allow="autoplay; fullscreen">
                        </iframe>
                        <div class="video-info-overlay">
                            <div class="video-title-small">${item.title.substring(0, 60)}${item.title.length > 60 ? '...' : ''}</div>
                            <div class="video-meta">
                                <span><i class="fas fa-eye"></i> Trending</span>
                                <span><i class="fas fa-heart"></i> 1.2k</span>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <span class="footer-item"><i class="fas fa-heart"></i> 1.2k</span>
                        <span class="footer-item"><i class="fas fa-comment"></i> 89</span>
                        <span class="footer-item"><i class="fas fa-share"></i> Share</span>
                    </div>
                `;
            } else if (item.type === 'post') {
                // Community post
                card.innerHTML = `
                    <div class="card-header">
                        <div class="channel-icon">${item.icon || '👤'}</div>
                        <div class="channel-info">
                            <div class="channel-name">${item.author}</div>
                            <div class="post-time">${item.time}</div>
                        </div>
                        <i class="fas fa-ellipsis-h"></i>
                    </div>
                    <div class="card-title">${item.title}</div>
                    <div class="card-description">${item.content}</div>
                    ${item.image ? '<div class="image-placeholder"><i class="fas fa-mountain-sun"></i></div>' : ''}
                    <div class="card-footer">
                        <span class="footer-item"><i class="fas fa-heart"></i> ${item.likes}</span>
                        <span class="footer-item"><i class="fas fa-comment"></i> ${item.comments}</span>
                        <span class="footer-item"><i class="fas fa-share"></i> Share</span>
                    </div>
                `;
            } else if (item.type === 'event') {
                // Event card
                card.innerHTML = `
                    <div class="card-header">
                        <div class="channel-icon"><i class="fas fa-calendar-alt"></i></div>
                        <div class="channel-info">
                            <div class="channel-name">Goa Events</div>
                            <div class="post-time">Featured</div>
                        </div>
                        <i class="fas fa-ellipsis-h"></i>
                    </div>
                    <div class="image-placeholder">
                        <i class="fas fa-music"></i>
                    </div>
                    <div class="card-title">${item.title}</div>
                    <div class="event-details">
                        <span><i class="fas fa-map-pin"></i> ${item.venue}</span>
                        <span><i class="fas fa-clock"></i> ${item.date}</span>
                    </div>
                    <div class="card-footer">
                        <span class="footer-item"><i class="fas fa-user-plus"></i> ${item.attendees}</span>
                        <span class="footer-item"><i class="fas fa-tag"></i> ${item.price}</span>
                    </div>
                `;
            }

            // Observe video containers for autoplay
            const videoContainer = card.querySelector('.video-container');
            if (videoContainer) {
                playerManager.observe(videoContainer);
            }

            return card;
        }

        // Load live stories
        function loadLiveStories() {
            const lives = [
                { name: 'Goa News Live', label: 'LIVE', icon: '📺' },
                { name: 'Beach Party', label: 'LIVE', icon: '🎵' },
                { name: 'Mass at Church', label: 'LIVE', icon: '⛪' },
                { name: 'Market Vibes', label: 'LIVE', icon: '🛍️' }
            ];
            
            liveStories.innerHTML = '';
            lives.forEach(live => {
                const story = document.createElement('div');
                story.className = 'story-item';
                story.innerHTML = `
                    <div class="story-avatar live">
                        <div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-size:2rem;">
                            ${live.icon}
                        </div>
                    </div>
                    <div class="story-label">${live.name}</div>
                `;
                liveStories.appendChild(story);
            });
        }

        // Load and mix the feed
        async function loadFeed() {
            loadingEl.style.display = 'block';
            feedContainer.innerHTML = '';
            feedContainer.appendChild(loadingEl);

            // Fetch all channel videos
            const videoPromises = channels.map(fetchChannelVideos);
            const videoResults = await Promise.all(videoPromises);
            const allVideos = videoResults.flat();

            // Mix content: interleave videos with community posts
            const mixedFeed = [];
            let videoIndex = 0;
            let postIndex = 0;

            // Create a varied mix
            for (let i = 0; i < 20; i++) {
                if (i % 3 === 0 && postIndex < communityPosts.length) {
                    // Add community post
                    mixedFeed.push({ ...communityPosts[postIndex], type: communityPosts[postIndex].type });
                    postIndex = (postIndex + 1) % communityPosts.length;
                } else if (videoIndex < allVideos.length) {
                    // Add video
                    mixedFeed.push(allVideos[videoIndex]);
                    videoIndex++;
                }
            }

            // Clear and render
            feedContainer.innerHTML = '';
            
            mixedFeed.forEach(item => {
                const card = createFeedCard(item);
                feedContainer.appendChild(card);
            });

            loadingEl.style.display = 'none';
        }

        // Initialize
        loadLiveStories();
        loadFeed();

        // Handle touch to unmute
        document.addEventListener('touchstart', () => {
            document.querySelectorAll('iframe').forEach(iframe => {
                if (iframe.src.includes('mute=1')) {
                    iframe.src = iframe.src.replace('mute=1', 'mute=0');
                }
            });
        }, { once: true });
    </script>
</body>
</html>

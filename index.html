<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Goa Social Feed Test</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f2f2f2;
}

/* HEADER */

.header{
background:#0b5ed7;
color:white;
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
}

/* TABS */

.tabs{
display:flex;
overflow-x:auto;
background:white;
border-bottom:1px solid #ddd;
}

.tabs div{
padding:12px 16px;
font-weight:bold;
color:#555;
white-space:nowrap;
}

.tabs .active{
color:#0b5ed7;
border-bottom:3px solid #0b5ed7;
}

/* SECTION TITLES */

.section-title{
padding:15px;
font-weight:bold;
font-size:18px;
}

/* LIVE SECTION */

.live-row{
display:flex;
overflow-x:auto;
padding-left:10px;
}

.live-card{
min-width:150px;
margin-right:10px;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.live-card img{
width:100%;
height:90px;
object-fit:cover;
}

.live-card p{
padding:8px;
font-size:13px;
margin:0;
}

/* VIDEO CARD */

.video-card{
background:white;
margin:10px;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.video-card iframe{
width:100%;
height:300px;
border:none;
}

.video-info{
padding:10px;
font-weight:bold;
font-size:14px;
}

/* NEWS CARD */

.news-card{
display:flex;
background:white;
margin:10px;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

.news-card img{
width:100px;
height:80px;
object-fit:cover;
}

.news-text{
padding:10px;
font-size:14px;
}

</style>

</head>

<body>

<div class="header">Goa Social</div>

<div class="tabs">
<div class="active">ALL</div>
<div>Trending</div>
<div>Local</div>
<div>Live</div>
<div>News</div>
<div>Videos</div>
</div>

<!-- LIVE SECTION -->

<div class="section-title">LIVE NOW</div>

<div class="live-row">

<div class="live-card">
<img src="https://images.unsplash.com/photo-1603565816030-6b389eeb23cb">
<p>Live Mass</p>
</div>

<div class="live-card">
<img src="https://images.unsplash.com/photo-1495020689067-958852a7765e">
<p>Goa News Live</p>
</div>

<div class="live-card">
<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
<p>Beach Party Live</p>
</div>

</div>

<!-- VIDEO -->

<div class="section-title">VIDEOS</div>

<div class="video-card">
<iframe
src="https://www.youtube.com/embed/z_8Gzjx3s_Q?enablejsapi=1&autoplay=1&mute=0&controls=1&playsinline=1"
allow="autoplay">
</iframe>
<div class="video-info">Goa Travel Highlights</div>
</div>

<div class="video-card">
<iframe
src="https://www.youtube.com/embed/ScMzIvxBSi4?enablejsapi=1&autoplay=1&mute=0&controls=1&playsinline=1"
allow="autoplay">
</iframe>
<div class="video-info">Baga Beach Drone View</div>
</div>

<!-- NEWS -->

<div class="section-title">GOA NEWS</div>

<div class="news-card">
<img src="https://images.unsplash.com/photo-1581090700227-4c4c9b87b2b5">
<div class="news-text">
Monsoon arrival expected next week
</div>
</div>

<div class="news-card">
<img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836">
<div class="news-text">
New food festival announced in Panjim
</div>
</div>

<script>

/* AUTOPLAY ENGINE */

let observer = new IntersectionObserver(entries => {

entries.forEach(entry => {

let frame = entry.target.querySelector("iframe")

if(!frame) return

if(entry.isIntersecting){

frame.contentWindow.postMessage(
'{"event":"command","func":"playVideo","args":""}',
'*'
)

}else{

frame.contentWindow.postMessage(
'{"event":"command","func":"pauseVideo","args":""}',
'*'
)

}

})

},{threshold:0.6})

document.querySelectorAll(".video-card").forEach(v=>observer.observe(v))

</script>

</body>
</html>

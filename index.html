<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Goa Social Channel ID Extractor</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:40px;
}

textarea{
width:100%;
height:260px;
margin-bottom:20px;
background:#222;
color:white;
border:none;
padding:10px;
}

button{
padding:14px 22px;
font-size:16px;
cursor:pointer;
background:#1877f2;
border:none;
color:white;
}

pre{
background:#222;
padding:20px;
margin-top:20px;
white-space:pre-wrap;
}

</style>
</head>

<body>

<h2>Goa Social Channel ID Tool</h2>

<textarea id="links">

https://youtube.com/@adventuregoadk
https://youtube.com/shorts/dDv06j8Orok
https://youtube.com/@rdxgoa
https://youtube.com/@goa365tv
https://youtube.com/@prudentmediagoatv
https://youtube.com/@goachanneluk
https://youtube.com/@rakshandasrecipes8691
https://youtube.com/@bushu_talkiesdollmmaa
https://youtube.com/@_we_raj_
https://youtube.com/@goaplatform
https://youtube.com/@hellopeoplewithshaneli
https://youtube.com/@swancyfernandes
https://youtube.com/@glendyfernandes10
https://youtube.com/@mosesjsaldanha
https://youtube.com/@lesleyingoa
https://youtube.com/@teranellefernandes

</textarea>

<button onclick="extract()">Get Channel IDs</button>

<pre id="output"></pre>

<script>

const API_KEY="PASTE_YOUR_API_KEY_HERE";

async function extract(){

const text=document.getElementById("links").value;

const links=text.split("\n").filter(l=>l.trim());

const ids=[];

for(const link of links){

if(!link.includes("@")) continue;

const handle=link.split("@")[1].split("?")[0];

const res=await fetch(
`https://www.googleapis.com/youtube/v3/search?part=snippet&type=channel&q=${handle}&key=${API_KEY}`
);

const data=await res.json();

if(data.items && data.items.length>0){

ids.push(data.items[0].snippet.channelId);

}

}

document.getElementById("output").textContent =
`const CHANNELS = [
"${ids.join('",\n"')}"
];`;

}

</script>

</body>
</html>

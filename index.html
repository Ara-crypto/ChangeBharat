<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Auto Channel ID Extractor</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
padding:40px;
}

pre{
background:#222;
padding:20px;
margin-top:20px;
white-space:pre-wrap;
}

</style>

</head>

<body>

<h2>Goa Social Channel IDs</h2>
<p>Fetching channel IDs automatically...</p>

<pre id="output">Loading...</pre>

<script>

const API_KEY="PASTE_YOUR_KEY_HERE";

const CHANNEL_LINKS=[

"https://youtube.com/@adventuregoadk",
"https://youtube.com/@rdxgoa",
"https://youtube.com/@goa365tv",
"https://youtube.com/@prudentmediagoatv",
"https://youtube.com/@goachanneluk",
"https://youtube.com/@rakshandasrecipes8691",
"https://youtube.com/@bushu_talkiesdollmmaa",
"https://youtube.com/@_we_raj_",
"https://youtube.com/@goaplatform",
"https://youtube.com/@hellopeoplewithshaneli",
"https://youtube.com/@swancyfernandes",
"https://youtube.com/@glendyfernandes10",
"https://youtube.com/@mosesjsaldanha",
"https://youtube.com/@lesleyingoa",
"https://youtube.com/@teranellefernandes"

];

async function getChannelId(handle){

const res=await fetch(
`https://www.googleapis.com/youtube/v3/search?part=snippet&type=channel&q=${handle}&maxResults=1&key=${API_KEY}`
);

const data=await res.json();

if(data.items && data.items.length){

return data.items[0].snippet.channelId;

}

return null;

}

async function start(){

let ids=[];

for(const link of CHANNEL_LINKS){

const handle=link.split("@")[1];

const id=await getChannelId(handle);

if(id) ids.push(id);

}

document.getElementById("output").textContent=

`const CHANNELS = [
"${ids.join('",\n"')}"
];`;

}

start();

</script>

</body>
</html>

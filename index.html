<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Goa Social · Fresh Feed</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f0f2f5, #e4e6eb);
            color: #1c1e21;
            line-height: 1.4;
            padding-bottom: 70px;
            min-height: 100vh;
            position: relative;
        }

        /* Subtle coconut tree decorations */
        .coconut-left {
            position: fixed;
            bottom: 80px;
            left: 10px;
            font-size: 4rem;
            opacity: 0.15;
            transform: rotate(-10deg);
            z-index: 0;
            pointer-events: none;
            animation: swayLeft 6s ease-in-out infinite;
        }

        .coconut-right {
            position: fixed;
            bottom: 80px;
            right: 10px;
            font-size: 4rem;
            opacity: 0.15;
            transform: rotate(10deg) scaleX(-1);
            z-index: 0;
            pointer-events: none;
            animation: swayRight 6s ease-in-out infinite;
        }

        @keyframes swayLeft {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(-5deg); }
        }

        @keyframes swayRight {
            0%, 100% { transform: rotate(10deg) scaleX(-1); }
            50% { transform: rotate(5deg) scaleX(-1); }
        }

        /* ===== SPLASH SCREEN ===== */
        .splash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(145deg, #1877f2, #0a5cff);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
        }

        .splash-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .splash-content {
            text-align: center;
            animation: burstAndFade 2s forwards;
        }

        @keyframes burstAndFade {
            0% { transform: scale(0.5); opacity: 0; }
            30% { transform: scale(1.2); opacity: 1; }
            60% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .splash-logo {
            width: 140px;
            height: 140px;
            border-radius: 35px;
            overflow: hidden;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 4px solid white;
        }

        .splash-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .splash-title {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        /* Tap prompt (appears after burst) */
        .tap-prompt {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.95);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
        }

        .tap-prompt.visible {
            display: flex;
        }

        .tap-content {
            text-align: center;
            animation: gentlePulse 2s infinite;
        }

        @keyframes gentlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .tap-logo {
            width: 100px;
            height: 100px;
            border-radius: 25px;
            overflow: hidden;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(24,119,242,0.3);
            border: 3px solid #1877f2;
        }

        .tap-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .tap-message {
            font-size: 1.5rem;
            color: #1877f2;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .tap-hint {
            color: #65676b;
            font-size: 1.1rem;
        }

        .tap-hint i {
            color: #1877f2;
            margin-right: 8px;
        }

        /* ===== YOUTUBE PLAYER ===== */
        .youtube-player-container {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            z-index: 1000;
            background: white;
            display: none;
            padding: 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .youtube-player-container.active {
            display: block;
        }

        .player-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            max-width: 800px;
            margin: 0 auto;
        }

        .player-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .close-player {
            position: absolute;
            top: -40px;
            right: 10px;
            background: #1877f2;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            z-index: 1001;
        }

        /* ===== HEADER ===== */
        .app-header {
            background: white;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 12px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e4e6eb;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .logo-crop {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            overflow: hidden;
            background: #1877f2;
            flex-shrink: 0;
            border: 1px solid #e4e6eb;
        }

        .logo-crop img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #1877f2;
        }

        .header-actions {
            display: flex;
            gap: 20px;
            color: #65676b;
        }

        .header-actions i {
            font-size: 1.3rem;
        }

        /* ===== STORIES ===== */
        .stories-section {
            padding: 16px 16px 12px 16px;
            background: white;
            margin: 8px 0;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1c1e21;
        }

        .section-header a {
            color: #1877f2;
            font-size: 0.9rem;
            text-decoration: none;
            font-weight: 500;
        }

        .stories-scroll {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 4px;
        }

        .stories-scroll::-webkit-scrollbar {
            display: none;
        }

        .story-item {
            min-width: 90px;
            text-align: center;
        }

        .story-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(145deg, #e4e6eb, #d8dade);
            position: relative;
            overflow: hidden;
            margin: 0 auto 8px auto;
            border: 3px solid #1877f2;
        }

        .story-avatar.live::after {
            content: 'LIVE';
            position: absolute;
            bottom: 4px;
            right: 4px;
            background: #ff0000;
            color: white;
            font-size: 0.55rem;
            padding: 2px 6px;
            border-radius: 20px;
            font-weight: 600;
        }

        .story-avatar-inner {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            background: white;
            color: #1877f2;
        }

        .story-label {
            font-size: 0.75rem;
            color: #65676b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ===== CATEGORIES ===== */
        .categories-section {
            padding: 12px 16px;
            background: white;
            margin: 8px 0;
        }

        .chips-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .chips-scroll::-webkit-scrollbar {
            display: none;
        }

        .chip {
            background: #f0f2f5;
            color: #1c1e21;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            white-space: nowrap;
            border: 1px solid #e4e6eb;
            font-weight: 500;
        }

        .chip.active {
            background: #1877f2;
            color: white;
            font-weight: 600;
            border: none;
        }

        /* ===== FEED ===== */
        .feed-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 8px 0 20px 0;
        }

        .feed-card {
            background: white;
            border-radius: 16px;
            margin: 0 12px 16px 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border: 1px solid #e4e6eb;
        }

        .card-header {
            display: flex;
            align-items: center;
            padding: 14px;
            gap: 12px;
        }

        .channel-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #1877f2;
            border: 1px solid #e4e6eb;
        }

        .channel-info {
            flex: 1;
        }

        .channel-name {
            font-weight: 600;
            font-size: 1rem;
            color: #1c1e21;
        }

        .post-time {
            font-size: 0.7rem;
            color: #65676b;
            margin-top: 2px;
        }

        .card-header i {
            color: #65676b;
            font-size: 1.2rem;
        }

        .card-title {
            padding: 0 14px 10px 14px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #1c1e21;
        }

        .card-description {
            padding: 0 14px 14px 14px;
            color: #65676b;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* Video container */
        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            aspect-ratio: 9/16;
            max-height: 500px;
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Image placeholder */
        .image-placeholder {
            width: 100%;
            height: 200px;
            background: linear-gradient(145deg, #f0f2f5, #e4e6eb);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1877f2;
            font-size: 3rem;
            border-top: 1px solid #e4e6eb;
            border-bottom: 1px solid #e4e6eb;
        }

        /* Card footer */
        .card-footer {
            padding: 14px;
            display: flex;
            gap: 24px;
            border-top: 1px solid #e4e6eb;
        }

        .footer-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #65676b;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .footer-item i.fa-heart { color: #f23b5c; }
        .footer-item i.fa-comment { color: #1877f2; }
        .footer-item i.fa-share { color: #42b72a; }

        /* Share popup */
        .share-popup {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 24px 24px 0 0;
            padding: 20px;
            z-index: 10001;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
        }

        .share-popup.visible {
            transform: translateY(0);
        }

        .share-popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .share-popup-header h3 {
            font-size: 1.2rem;
            color: #1c1e21;
        }

        .close-share {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #65676b;
            cursor: pointer;
        }

        .share-options {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            text-align: center;
        }

        .share-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .share-icon {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        .share-icon.whatsapp { background: #25D366; color: white; }
        .share-icon.instagram { background: linear-gradient(45deg, #f09433, #d62976, #962fbf); color: white; }
        .share-icon.facebook { background: #1877f2; color: white; }
        .share-icon.copy { background: #f0f2f5; color: #1c1e21; }

        .share-option span {
            font-size: 0.8rem;
            color: #65676b;
        }

        .share-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 10000;
            display: none;
        }

        .share-overlay.visible {
            display: block;
        }

        .event-details {
            padding: 0 14px 14px 14px;
            display: flex;
            gap: 20px;
            color: #1877f2;
            font-size: 0.9rem;
        }

        .event-details span i {
            margin-right: 6px;
            color: #65676b;
        }

        .video-info-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px 14px 14px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            color: white;
            pointer-events: none;
        }

        .video-title-small {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: white;
        }

        .video-meta {
            font-size: 0.7rem;
            color: #ccc;
            display: flex;
            gap: 12px;
        }

        .loading-indicator {
            text-align: center;
            padding: 30px;
            color: #1877f2;
        }

        .loading-indicator i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #e4e6eb;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 10px 12px 10px;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #65676b;
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 30px;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .nav-item i {
            font-size: 1.5rem;
            margin-bottom: 2px;
        }

        .nav-item.active {
            color: #1877f2;
        }
    </style>
</head>

                venue: 'Arpora',
                date: 'Every Saturday',
                price: 'Free',
                attendees: '5.1k interested',
                image: true
            }
        ];

        // DOM Elements
        const feedContainer = document.getElementById('feedContainer');
        const liveStories = document.getElementById('liveStories');
        const loadingEl = document.getElementById('loading');
        const splashOverlay = document.getElementById('splashOverlay');
        const tapPrompt = document.getElementById('tapPrompt');
        const youtubePlayerContainer = document.getElementById('youtubePlayerContainer');
        const youtubePlayer = document.getElementById('youtubePlayer');
        const closePlayerBtn = document.getElementById('closePlayerBtn');
        const logoContainer = document.getElementById('logoContainer');
        const sharePopup = document.getElementById('sharePopup');
        const shareOverlay = document.getElementById('shareOverlay');
        const closeShare = document.getElementById('closeShare');
        
        // App state
        let userInteracted = false;
        let videoPlayerManager = null;
        let logoClickCount = 0;
        let currentShareVideoId = null;
        let audioAllowed = false; // New flag: true after first user tap

        // Function to unmute all iframes using YouTube API
        function unmuteAllVideos() {
            document.querySelectorAll('.video-container iframe').forEach(iframe => {
                if (iframe.contentWindow) {
                    iframe.contentWindow.postMessage('{"event":"command","func":"unMute","args":""}', '*');
                }
            });
        }

        // Auto-progress splash: burst animation then show tap prompt
        setTimeout(() => {
            splashOverlay.classList.add('hidden');
            setTimeout(() => {
                tapPrompt.classList.add('visible');
            }, 500);
        }, 2000);

        // Share popup functions
        function showSharePopup(videoId) {
            currentShareVideoId = videoId;
            shareOverlay.classList.add('visible');
            sharePopup.classList.add('visible');
        }

        function hideSharePopup() {
            shareOverlay.classList.remove('visible');
            sharePopup.classList.remove('visible');
            currentShareVideoId = null;
        }

        // Handle share option clicks
        document.querySelectorAll('.share-option').forEach(option => {
            option.addEventListener('click', (e) => {
                const shareType = option.dataset.share;
                if (!currentShareVideoId) return;

                const shareUrl = `${window.location.origin}${window.location.pathname}?v=${currentShareVideoId}`;
                
                switch(shareType) {
                    case 'whatsapp':
                        window.open(`https://wa.me/?text=${encodeURIComponent(shareUrl)}`, '_blank');
                        break;
                    case 'instagram':
                        // Instagram doesn't have direct share URL, so copy to clipboard
                        navigator.clipboard.writeText(shareUrl);
                        alert('Link copied! Open Instagram and paste it.');
                        break;
                    case 'facebook':
                        window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}`, '_blank');
                        break;
                    case 'copy':
                        navigator.clipboard.writeText(shareUrl);
                        alert('Link copied to clipboard!');
                        break;
                }
                hideSharePopup();
            });
        });

        closeShare.addEventListener('click', hideSharePopup);
        shareOverlay.addEventListener('click', hideSharePopup);

        // Secret developer mode: tap logo 7 times
        logoContainer.addEventListener('click', () => {
            if (!userInteracted) return;
            logoClickCount++;
            if (logoClickCount === 7) {
                // Open developer page in new tab
                const devWindow = window.open('about:blank', '_blank');
                if (devWindow) {
                    devWindow.document.write(`
                        <!DOCTYPE html>
                        <html>
                        <head>
                            <title>Goa Social · Developer Mode</title>
                            <meta name="viewport" content="width=device-width, initial-scale=1">
                            <style>
                                body {
                                    background: linear-gradient(145deg, #1877f2, #0a5cff);
                                    color: white;
                                    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                                    display: flex;
                                    align-items: center;
                                    justify-content: center;
                                    min-height: 100vh;
                                    margin: 0;
                                    padding: 20px;
                                    text-align: center;
                                }
                                .container {
                                    max-width: 600px;
                                }
                                h1 {
                                    font-size: 2.5rem;
                                    margin-bottom: 20px;
                                }
                                p {
                                    font-size: 1.2rem;
                                    opacity: 0.9;
                                    line-height: 1.6;
                                }
                                .badge {
                                    background: white;
                                    color: #1877f2;
                                    padding: 8px 20px;
                                    border-radius: 40px;
                                    display: inline-block;
                                    margin-top: 30px;
                                    font-weight: bold;
                                }
                            </style>
                        </head>
                        <body>
                            <div class="container">
                                <h1>🔧 Developer Console</h1>
                                <p>Goa Social Analytics Dashboard</p>
                                <p style="font-size: 1rem; margin-top: 40px;">This page will be connected to your analytics backend.</p>
                                <div class="badge">DEV MODE ACTIVE</div>
                            </div>
                        </body>
                        </html>
                    `);
                }
                logoClickCount = 0;
            }
        });

        // Initialize app after user interaction (tap anywhere on tap prompt)
        function startApp() {
            if (userInteracted) return;
            userInteracted = true;
            
            // Hide tap prompt
            tapPrompt.classList.remove('visible');
            
            // Unlock audio: set flag and unmute all existing videos
            if (!audioAllowed) {
                audioAllowed = true;
                unmuteAllVideos();
            }
            
            // Initialize video player manager with optimized loading
            class VideoPlayerManager {
                constructor() {
                    this.observer = new IntersectionObserver((entries) => {
                        entries.forEach(entry => {
                            const iframe = entry.target.querySelector('iframe');
                            if (!iframe) return;

                            if (entry.isIntersecting) {
                                // Play current video (will be unmuted if audioAllowed)
                                iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
                            } else {
                                // Pause background videos
                                iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
                            }
                        });
                    }, { threshold: 0.6 });
                }

                observe(element) {
                    this.observer.observe(element);
                }

                unobserve(element) {
                    this.observer.unobserve(element);
                }
            }

            videoPlayerManager = new VideoPlayerManager();
            
            // Load feed and setup videos
            loadFeed();
        }

        // Also handle any other tap on the document to unlock audio (just in case)
        document.addEventListener('click', function unlockOnFirstTap() {
            if (!audioAllowed && userInteracted) {
                audioAllowed = true;
                unmuteAllVideos();
            }
            document.removeEventListener('click', unlockOnFirstTap);
        }, { once: true });

        document.addEventListener('touchstart', function unlockOnFirstTouch() {
            if (!audioAllowed && userInteracted) {
                audioAllowed = true;
                unmuteAllVideos();
            }
            document.removeEventListener('touchstart', unlockOnFirstTouch);
        }, { once: true });

        tapPrompt.addEventListener('click', startApp);

        // YouTube Player Functions
        function loadVideoFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const videoId = urlParams.get('v');
            
            if (videoId) {
                youtubePlayerContainer.classList.add('active');
                youtubePlayer.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
            }
        }

        // Close player
        closePlayerBtn.addEventListener('click', () => {
            youtubePlayerContainer.classList.remove('active');
            youtubePlayer.src = '';
        });

        // Check URL on load
        loadVideoFromUrl();

        // Format time ago
        function timeAgo(dateString) {
            const now = new Date();
            const published = new Date(dateString);
            const diffMs = now - published;
            const diffHr = Math.floor(diffMs / (1000 * 60 * 60));
            
            if (diffHr < 24) return diffHr + ' hours ago';
            if (diffHr < 48) return 'yesterday';
            return Math.floor(diffHr / 24) + ' days ago';
        }

        // Fetch videos for a channel with error handling and preloading
        async function fetchChannelVideos(channel) {
            try {
                const channelUrl = `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${channel.id}&key=${API_KEY}`;
                const channelRes = await fetch(channelUrl);
                const channelData = await channelRes.json();
                
                if (!channelData.items || !channelData.items[0]) return [];
                
                const uploadsId = channelData.items[0].contentDetails.relatedPlaylists.uploads;
                
                // Get 8 videos per channel for more content
                const playlistUrl = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${uploadsId}&maxResults=8&key=${API_KEY}`;
                const playlistRes = await fetch(playlistUrl);
                const playlistData = await playlistRes.json();
                
                return playlistData.items
                    .filter(item => item.snippet && item.snippet.resourceId && item.snippet.resourceId.videoId)
                    .map(item => ({
                        ...channel,
                        type: 'video',
                        videoId: item.snippet.resourceId.videoId,
                        title: item.snippet.title,
                        publishedAt: item.snippet.publishedAt,
                        thumbnail: item.snippet.thumbnails.high?.url
                    }));
            } catch (e) {
                console.warn(`Failed for ${channel.name}`, e);
                return [];
            }
        }

        // Preload video iframe (creates hidden iframe to warm up connection)
        function preloadVideo(videoId) {
            const preloadDiv = document.createElement('div');
            preloadDiv.style.display = 'none';
            preloadDiv.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?enablejsapi=1&autoplay=0&mute=1&controls=0&playsinline=1" allow="autoplay"></iframe>`;
            document.body.appendChild(preloadDiv);
            setTimeout(() => preloadDiv.remove(), 5000);
        }

        // Create a feed card based on type
        function createFeedCard(item) {
            const card = document.createElement('div');
            card.className = 'feed-card';

            if (item.type === 'video') {
                // Preload the next few videos
                preloadVideo(item.videoId);
                
                card.innerHTML = `
                    <div class="card-header">
                        <div class="channel-icon">${item.icon || '📺'}</div>
                        <div class="channel-info">
                            <div class="channel-name">${item.name}</div>
                            <div class="post-time">${timeAgo(item.publishedAt)}</div>
                        </div>
                        <i class="fas fa-ellipsis-h"></i>
                    </div>
                    <div class="video-container" data-video-id="${item.videoId}">
                        <iframe 
                            src="https://www.youtube.com/embed/${item.videoId}?enablejsapi=1&autoplay=1&mute=1&controls=0&playsinline=1&loop=1&playlist=${item.videoId}"
                            allow="autoplay; fullscreen">
                        </iframe>
                        <div class="video-info-overlay">
                            <div class="video-title-small">${item.title.substring(0, 60)}${item.title.length > 60 ? '...' : ''}</div>
                            <div class="video-meta">
                                <span><i class="fas fa-eye"></i> Trending</span>
                                <span><i class="fas fa-heart"></i> 1.2k</span>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <span class="footer-item like-btn"><i class="fas fa-heart"></i> 1.2k</span>
                        <span class="footer-item comment-btn"><i class="fas fa-comment"></i> 89</span>
                        <span class="footer-item share-btn" data-video-id="${item.videoId}"><i class="fas fa-share"></i> Share</span>
                    </div>
                `;
                
                // Add share event listener
                const shareBtn = card.querySelector('.share-btn');
                shareBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    showSharePopup(item.videoId);
                });
                
                // Observe for autoplay if app has started
                const videoContainer = card.querySelector('.video-container');
                if (videoContainer && videoPlayerManager) {
                    videoPlayerManager.observe(videoContainer);
                    
                    // If the container is currently visible, trigger play immediately
                    const rect = videoContainer.getBoundingClientRect();
                    if (rect.top < window.innerHeight && rect.bottom > 0) {
                        setTimeout(() => {
                            const iframe = videoContainer.querySelector('iframe');
                            if (iframe) {
                                iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
                            }
                        }, 500);
                    }
                }
                
            } else if (item.type === 'post') {
                card.innerHTML = `
                    <div class="card-header">
                        <div class="channel-icon">${item.icon || '👤'}</div>
                        <div class="channel-info">
                            <div class="channel-name">${item.author}</div>
                            <div class="post-time">${item.time}</div>
                        </div>
                        <i class="fas fa-ellipsis-h"></i>
                    </div>
                    <div class="card-title">${item.title}</div>
                    <div class="card-description">${item.content}</div>
                    ${item.image ? '<div class="image-placeholder"><i class="fas fa-umbrella-beach"></i></div>' : ''}
                    <div class="card-footer">
                        <span class="footer-item"><i class="fas fa-heart"></i> ${item.likes}</span>
                        <span class="footer-item"><i class="fas fa-comment"></i> ${item.comments}</span>
                        <span class="footer-item"><i class="fas fa-share"></i> Share</span>
                    </div>
                `;
            } else if (item.type === 'event') {
                card.innerHTML = `
                    <div class="card-header">
                        <div class="channel-icon"><i class="fas fa-calendar-alt"></i></div>
                        <div class="channel-info">
                            <div class="channel-name">Goa Events</div>
                            <div class="post-time">Featured</div>
                        </div>
                        <i class="fas fa-ellipsis-h"></i>
                    </div>
                    <div class="image-placeholder">
                        <i class="fas fa-music"></i>
                    </div>
                    <div class="card-title">${item.title}</div>
                    <div class="event-details">
                        <span><i class="fas fa-map-pin"></i> ${item.venue}</span>
                        <span><i class="fas fa-clock"></i> ${item.date}</span>
                    </div>
                    <div class="card-footer">
                        <span class="footer-item"><i class="fas fa-user-plus"></i> ${item.attendees}</span>
                        <span class="footer-item"><i class="fas fa-tag"></i> ${item.price}</span>
                    </div>
                `;
            }

            return card;
        }

        // Load live stories
        function loadLiveStories() {
            const lives = [
                { name: 'Goa News Live', icon: '📺' },
                { name: 'Beach Party', icon: '🎵' },
                { name: 'Mass at Church', icon: '⛪' },
                { name: 'Market Vibes', icon: '🛍️' },
                { name: 'Sunset Session', icon: '🌅' },
                { name: 'DJ Night', icon: '🎧' }
            ];
            
            liveStories.innerHTML = '';
            lives.forEach(live => {
                const story = document.createElement('div');
                story.className = 'story-item';
                story.innerHTML = `
                    <div class="story-avatar live">
                        <div class="story-avatar-inner">
                            ${live.icon}
                        </div>
                    </div>
                    <div class="story-label">${live.name}</div>
                `;
                liveStories.appendChild(story);
            });
        }

        // Load and mix the feed
        async function loadFeed() {
            loadingEl.style.display = 'block';
            feedContainer.innerHTML = '';
            feedContainer.appendChild(loadingEl);

            // Fetch all channel videos in parallel
            const videoPromises = channels.map(fetchChannelVideos);
            const videoResults = await Promise.all(videoPromises);
            const allVideos = videoResults.flat().filter(v => v && v.videoId);

            // Mix content: interleave videos with community posts
            const mixedFeed = [];
            let videoIndex = 0;
            let postIndex = 0;

            // Create a longer feed (40 items)
            for (let i = 0; i < 40; i++) {
                if (i % 3 === 0 && postIndex < communityPosts.length) {
                    mixedFeed.push({ ...communityPosts[postIndex], type: communityPosts[postIndex].type });
                    postIndex = (postIndex + 1) % communityPosts.length;
                } else if (videoIndex < allVideos.length) {
                    mixedFeed.push(allVideos[videoIndex]);
                    videoIndex++;
                } else {
                    // If we run out of videos, repeat community posts
                    if (postIndex < communityPosts.length) {
                        mixedFeed.push({ ...communityPosts[postIndex], type: communityPosts[postIndex].type });
                        postIndex = (postIndex + 1) % communityPosts.length;
                    }
                }
            }

            feedContainer.innerHTML = '';
            
            mixedFeed.forEach(item => {
                const card = createFeedCard(item);
                feedContainer.appendChild(card);
            });

            loadingEl.style.display = 'none';
            
            // Trigger a scroll event to start playing visible videos
            setTimeout(() => {
                window.dispatchEvent(new Event('scroll'));
            }, 500);
        }

        // Load live stories immediately
        loadLiveStories();

        // Handle popstate for back/forward navigation
        window.addEventListener('popstate', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const videoId = urlParams.get('v');
            
            if (videoId) {
                youtubePlayerContainer.classList.add('active');
                youtubePlayer.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
            } else {
                youtubePlayerContainer.classList.remove('active');
                youtubePlayer.src = '';
            }
        });
    </script>
</body>
</html>

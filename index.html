<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Goa Social</title>

<style>

body{
margin:0;
background:#000;
font-family:sans-serif;
overflow-x:hidden;
}

.video{
width:100%;
height:100vh;
position:relative;
}

.video iframe{
width:100%;
height:100%;
border:none;
}

.splash{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:#1877f2;
display:flex;
align-items:center;
justify-content:center;
z-index:999;
color:white;
font-size:28px;
font-weight:bold;
}

</style>
</head>

<body>

<div id="splash" class="splash">
Goa Social Loading...
</div>

<div id="feed"></div>

<script>

/* SHORT LINKS FROM YOUR CHANNELS */

const shorts = [

"https://www.youtube.com/embed/dDv06j8Orok",

"https://www.youtube.com/embed/VIDEOID2",

"https://www.youtube.com/embed/VIDEOID3",

"https://www.youtube.com/embed/VIDEOID4",

"https://www.youtube.com/embed/VIDEOID5"

];

/* STATE */

let containers=[]
let current=0
let userTapped=false

const feed=document.getElementById("feed")
const splash=document.getElementById("splash")

/* CREATE FEED */

shorts.forEach(id=>{

const div=document.createElement("div")

div.className="video"

div.innerHTML=`
<iframe
allow="autoplay"
src=""
data-src="${id}?autoplay=1&mute=1&controls=0&playsinline=1&loop=1&playlist=${id.split("/").pop()}"
></iframe>
`

feed.appendChild(div)

containers.push(div)

})

/* LOAD VIDEO */

function loadVideo(index){

const iframe=containers[index].querySelector("iframe")

if(!iframe.src){

iframe.src=iframe.dataset.src

}

}

/* PLAY VIDEO */

function play(index){

const iframe=containers[index].querySelector("iframe")

iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}',"*")

}

/* PAUSE VIDEO */

function pause(index){

const iframe=containers[index].querySelector("iframe")

iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}',"*")

}

/* BUFFER SYSTEM */

function updateBuffer(){

for(let i=current-2;i<=current+6;i++){

if(i>=0 && i<containers.length){

loadVideo(i)

}

}

}

/* OBSERVER */

const observer=new IntersectionObserver(entries=>{

entries.forEach(entry=>{

if(entry.isIntersecting){

const index=containers.indexOf(entry.target)

if(index!==current){

pause(current)

current=index

play(current)

if(userTapped){

const iframe=containers[current].querySelector("iframe")

iframe.contentWindow.postMessage('{"event":"command","func":"unMute","args":""}',"*")

}

updateBuffer()

}

}

})

},{threshold:0.6})

containers.forEach(c=>observer.observe(c))

/* FIRST VIDEO LOAD */

loadVideo(0)

setTimeout(()=>{

splash.style.display="none"

play(0)

updateBuffer()

},1500)

/* TAP UNLOCK */

document.body.addEventListener("click",()=>{

if(!userTapped){

userTapped=true

const iframe=containers[current].querySelector("iframe")

iframe.contentWindow.postMessage('{"event":"command","func":"unMute","args":""}',"*")

}

})

</script>

</body>
</html>

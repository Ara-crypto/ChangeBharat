<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Goa Social · Premium Feed</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #0a0a0a;
            color: #ffffff;
            line-height: 1.4;
            padding-bottom: 70px;
            min-height: 100vh;
            position: relative;
        }

        /* ===== SPLASH SCREEN ===== */
        .splash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
        }

        .splash-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .splash-stage {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Stage 1: Logo */
        .stage1 {
            animation: logoZoom 2s forwards;
        }

        @keyframes logoZoom {
            0% { opacity: 1; transform: scale(1); }
            70% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0; transform: scale(2); }
        }

        .splash-logo {
            width: 140px;
            height: 140px;
            border-radius: 35px;
            overflow: hidden;
            box-shadow: 0 0 30px #ff8c42, 0 20px 40px rgba(255, 107, 43, 0.5);
            border: 4px solid #ff8c42;
        }

        .splash-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Stage 2: Realistic Blast */
        .stage2 {
            opacity: 0;
            animation: blastFadeIn 0.2s forwards 1.8s, blastFlash 1s forwards 2s;
            background: #000;
        }

        @keyframes blastFadeIn {
            to { opacity: 1; }
        }

        .blast-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .blast-ring {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255, 140, 0, 0.8);
            box-shadow: 0 0 100px #ffaa00;
            animation: blastWave 1s ease-out forwards;
        }

        .blast-ring2 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(255, 200, 0, 0.5);
            filter: blur(20px);
            animation: blastWave2 1s ease-out forwards;
        }

        .blast-ring3 {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            border-radius: 50%;
            background: rgba(255, 100, 0, 0.3);
            filter: blur(40px);
            animation: blastWave3 1s ease-out forwards;
        }

        @keyframes blastWave {
            0% { width: 0; height: 0; opacity: 1; }
            100% { width: 800px; height: 800px; opacity: 0; }
        }

        @keyframes blastWave2 {
            0% { width: 0; height: 0; opacity: 1; }
            100% { width: 1200px; height: 1200px; opacity: 0; }
        }

        @keyframes blastWave3 {
            0% { width: 0; height: 0; opacity: 1; }
            100% { width: 1600px; height: 1600px; opacity: 0; }
        }

        .blast-flash {
            position: absolute;
            inset: 0;
            background: white;
            opacity: 0;
            animation: flash 0.3s forwards 2.5s;
        }

        @keyframes flash {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* Stage 3: Tap to Enter */
        .stage3 {
            opacity: 0;
            animation: fadeInTap 0.5s forwards 3s;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
        }

        @keyframes fadeInTap {
            to { opacity: 1; }
        }

        .tap-content {
            text-align: center;
            color: white;
        }

        .tap-content .mini-logo {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            overflow: hidden;
            margin: 0 auto 20px;
            border: 2px solid #ff8c42;
            box-shadow: 0 0 20px #ff8c42;
        }

        .tap-content .mini-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .tap-content h2 {
            font-size: 2rem;
            background: linear-gradient(135deg, #ff8c42, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255,140,66,0.5);
        }

        .tap-hint {
            margin-top: 30px;
            color: #ff8c42;
            font-size: 1.3rem;
            animation: pulse 1.5s infinite;
            cursor: pointer;
            text-shadow: 0 0 8px #ff8c42;
        }

        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); text-shadow: 0 0 20px #ff8c42; }
            100% { opacity: 0.6; transform: scale(1); }
        }

        /* ===== YOUTUBE PLAYER ===== */
        .youtube-player-container {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            z-index: 1000;
            background: #000;
            display: none;
            padding: 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .youtube-player-container.active {
            display: block;
        }

        .player-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            max-width: 800px;
            margin: 0 auto;
        }

        .player-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .close-player {
            position: absolute;
            top: -40px;
            right: 10px;
            background: #ff8c42;
            color: #000;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            z-index: 1001;
            box-shadow: 0 0 15px #ff8c42;
        }

        /* ===== HEADER ===== */
        .app-header {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 12px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #ff8c4233;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .logo-crop {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            overflow: hidden;
            background: #ff8c42;
            box-shadow: 0 0 15px #ff8c42, 0 4px 12px rgba(255, 107, 43, 0.3);
            flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-crop img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ff8c42, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 8px #ff8c42;
        }

        .header-actions {
            display: flex;
            gap: 20px;
            color: #ff8c42;
        }

        .header-actions i {
            font-size: 1.3rem;
            filter: drop-shadow(0 0 5px #ff8c42);
        }

        /* ===== STORIES ===== */
        .stories-section {
            padding: 16px 16px 12px 16px;
            border-bottom: 1px solid #ff8c4233;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #FFFFFF;
            text-shadow: 0 0 5px #ff8c42;
        }

        .section-header a {
            color: #ff8c42;
            font-size: 0.9rem;
            text-decoration: none;
            font-weight: 500;
            text-shadow: 0 0 5px #ff8c42;
        }

        .stories-scroll {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 4px;
        }

        .stories-scroll::-webkit-scrollbar {
            display: none;
        }

        .story-item {
            min-width: 90px;
            text-align: center;
        }

        .story-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #1A1A1A;
            position: relative;
            overflow: hidden;
            margin: 0 auto 8px auto;
            border: 2px solid #ff8c42;
            box-shadow: 0 0 15px #ff8c42;
        }

        .story-avatar.live::after {
            content: 'LIVE';
            position: absolute;
            bottom: 4px;
            right: 4px;
            background: #ff0000;
            color: white;
            font-size: 0.55rem;
            padding: 2px 6px;
            border-radius: 20px;
            font-weight: 600;
            box-shadow: 0 0 8px #ff0000;
        }

        .story-avatar-inner {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            background: #222;
            color: #ff8c42;
        }

        .story-label {
            font-size: 0.75rem;
            color: #ff8c42;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 0 3px #ff8c42;
        }

        /* ===== CATEGORIES ===== */
        .categories-section {
            padding: 12px 16px;
            border-bottom: 1px solid #ff8c4233;
        }

        .chips-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .chips-scroll::-webkit-scrollbar {
            display: none;
        }

        .chip {
            background: #1A1A1A;
            color: #FFFFFF;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            white-space: nowrap;
            border: 1px solid #ff8c4233;
            font-weight: 500;
            transition: all 0.2s;
        }

        .chip.active {
            background: #ff8c42;
            color: #000000;
            font-weight: 600;
            border: none;
            box-shadow: 0 0 15px #ff8c42;
        }

        .chip:hover {
            border-color: #ff8c42;
            box-shadow: 0 0 10px #ff8c42;
        }

        /* ===== FEED ===== */
        .feed-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px 0 20px 0;
        }

        .feed-card {
            background: #121212;
            border-radius: 28px;
            margin: 0 16px 24px 16px;
            overflow: hidden;
            box-shadow: 0 12px 30px rgba(0,0,0,0.8), 0 0 0 1px #ff8c4233;
            border: 1px solid #ff8c4233;
            position: relative;
            transition: box-shadow 0.3s;
        }

        .feed-card:hover {
            box-shadow: 0 12px 30px rgba(0,0,0,0.8), 0 0 20px #ff8c42;
        }

        .feed-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 28px;
            padding: 1px;
            background: linear-gradient(145deg, #ff8c42, transparent 70%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .card-header {
            display: flex;
            align-items: center;
            padding: 16px;
            gap: 12px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid #ff8c4233;
        }

        .channel-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: #1A1A1A;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #ff8c42;
            border: 1px solid #ff8c4233;
            box-shadow: 0 0 8px #ff8c42;
        }

        .channel-info {
            flex: 1;
        }

        .channel-name {
            font-weight: 600;
            font-size: 1rem;
            color: #FFFFFF;
        }

        .post-time {
            font-size: 0.7rem;
            color: #ff8c42;
            margin-top: 2px;
            opacity: 0.8;
        }

        .card-header i {
            color: #ff8c42;
            font-size: 1.2rem;
            filter: drop-shadow(0 0 5px #ff8c42);
        }

        .card-title {
            padding: 0 16px 12px 16px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #FFFFFF;
        }

        .card-description {
            padding: 0 16px 16px 16px;
            color: #CCCCCC;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            aspect-ratio: 9/16;
            max-height: 500px;
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none;
        }

        .image-placeholder {
            width: 100%;
            height: 200px;
            background: linear-gradient(145deg, #1A1A1A, #0A0A0A);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ff8c42;
            font-size: 3rem;
            border-top: 1px solid #ff8c4233;
            border-bottom: 1px solid #ff8c4233;
        }

        .card-footer {
            padding: 16px;
            display: flex;
            gap: 24px;
            border-top: 1px solid #ff8c4233;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        .footer-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #ff8c42;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            opacity: 0.9;
        }

        .footer-item:hover {
            color: #ffd700;
            text-shadow: 0 0 10px #ff8c42;
        }

        .footer-item i.fa-heart { color: #ff6b6b; text-shadow: 0 0 8px #ff6b6b; }
        .footer-item i.fa-comment { color: #4facfe; text-shadow: 0 0 8px #4facfe; }
        .footer-item i.fa-share { color: #ffd700; text-shadow: 0 0 8px #ffd700; }

        .share-tooltip {
            position: fixed;
            background: #ff8c42;
            color: #000;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            z-index: 10000;
            pointer-events: none;
            animation: tooltipFade 1.5s forwards;
            box-shadow: 0 0 20px #ff8c42;
        }

        @keyframes tooltipFade {
            0% { opacity: 0; transform: translateY(10px); }
            20% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }

        .event-details {
            padding: 0 16px 16px 16px;
            display: flex;
            gap: 20px;
            color: #ff8c42;
            font-size: 0.9rem;
        }

        .event-details span i {
            margin-right: 6px;
            color: #ff8c42;
        }

        .video-info-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px 16px 16px;
            background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
            color: white;
            pointer-events: none;
        }

        .video-title-small {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #FFFFFF;
        }

        .video-meta {
            font-size: 0.7rem;
            color: #ff8c42;
            display: flex;
            gap: 12px;
        }

        .loading-indicator {
            text-align: center;
            padding: 30px;
            color: #ff8c42;
        }

        .loading-indicator i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
            filter: drop-shadow(0 0 8px #ff8c42);
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(18px);
            border-top: 1px solid #ff8c4233;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 10px 12px 10px;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #ff8c42;
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 30px;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            opacity: 0.7;
        }

        .nav-item i {
            font-size: 1.5rem;
            margin-bottom: 2px;
            filter: drop-shadow(0 0 5px #ff8c42);
        }

        .nav-item.active {
            color: #ffd700;
            opacity: 1;
            text-shadow: 0 0 10px #ff8c42;
        }

        .nav-item.active i {
            filter: drop-shadow(0 0 10px #ff8c42);
        }

        /* Developer mode styles (hidden initially) */
        .dev-badge {
            position: fixed;
            bottom: 80px;
            right: 10px;
            background: #ff8c42;
            color: #000;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: bold;
            z-index: 1001;
            display: none;
            box-shadow: 0 0 15px #ff8c42;
        }
    </style>
</head>
<body>
    <!-- Developer badge (hidden until activated) -->

    <!-- SPLASH SCREEN -->
    <div class="splash-overlay" id="splashOverlay">
        <!-- Stage 1: Logo -->
        <div class="splash-stage stage1" id="stage1">
            <div class="splash-logo">
                <img src="https://i.imgur.com/u5kGI2s.jpeg" alt="Goa Social">

        </div>

        <!-- Stage 2: Realistic Blast -->
        <div class="splash-stage stage2" id="stage2">
            <div class="blast-container">
                <div class="blast-ring"></div>
                <div class="blast-ring2"></div>
                <div class="blast-ring3"></div>
                <div class="blast-flash"></div>
            </div>
        </div>

        <!-- Stage 3: Tap to Enter -->
        <div class="splash-stage stage3" id="stage3">
            <div class="tap-content">
                <div class="mini-logo">
                    <img src="https://i.imgur.com/u5kGI2s.jpeg" alt="Goa Social">
                </div>
                <h2>Goa Social</h2>
                <p style="color: #ff8c42; margin-bottom: 30px; text-shadow: 0 0 5px #ff8c42;">Your Goan community awaits</p>
                <div class="tap-hint" id="tapHint">
                    <i class="fas fa-hand-pointer"></i> TAP ANYWHERE TO ENTER
                </div>
            </div>
        </div>
    </div>

    <!-- YouTube Player Container (for shared videos) -->
    <div class="youtube-player-container" id="youtubePlayerContainer">
        <div class="player-wrapper">
            <button class="close-player" id="closePlayerBtn">&times;</button>
            <iframe id="youtubePlayer" allow="autoplay; fullscreen"></iframe>
        </div>
    </div>

    <!-- Header -->
    <header class="app-header">
        <div class="logo-container" id="logoContainer">
            <div class="logo-crop">
                <img src="https://i.imgur.com/u5kGI2s.jpeg" alt="Goa Social">
            </div>
            <span class="logo-text">Goa Social</span>
        </div>
        <div class="header-actions">
            <i class="fas fa-search"></i>
            <i class="fas fa-bell"></i>
        </div>
    </header>

    <!-- Stories / Live Section -->
    <div class="stories-section">
        <div class="section-header">
            <h3>LIVE NOW</h3>
            <a href="#">View all <i class="fas fa-chevron-right" style="font-size: 0.7rem;"></i></a>
        </div>
        <div class="stories-scroll" id="liveStories">
            <!-- Populated by JS -->
        </div>
    </div>

    <!-- Categories -->
    <div class="categories-section">
        <div class="chips-scroll">
            <span class="chip active">All</span>
            <span class="chip">Trending</span>
            <span class="chip">Local</span>
            <span class="chip">News</span>
            <span class="chip">Videos</span>
            <span class="chip">Events</span>
            <span class="chip">Food</span>
            <span class="chip">Travel</span>
        </div>
    </div>

    <!-- Main Feed Container -->
    <div class="feed-container" id="feedContainer">
        <div class="loading-indicator" id="loading">
            <i class="fas fa-circle-notch"></i>
            <p style="margin-top: 12px;">loading goa feed...</p>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button class="nav-item active" onclick="window.location.href='index.html'">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </button>
        <button class="nav-item" onclick="window.location.href='dating.html'">
            <i class="fas fa-heart"></i>
            <span>Dating</span>
        </button>
        <button class="nav-item" onclick="window.location.href='business.html'">
            <i class="fas fa-store"></i>
            <span>Business</span>
        </button>
        <button class="nav-item" onclick="window.location.href='chats.html'">
            <i class="fas fa-comment-dots"></i>
            <span>Chats</span>
        </button>
        <button class="nav-item" onclick="window.location.href='profile.html'">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </button>
    </nav>

    <script>
        // Configuration
        const API_KEY = 'AIzaSyDGHXHuPiHAfJGin_c2-LF4FZ5IBMYLNK4';
        
        // Expanded channels list for more videos

        // DOM Elements

        // App state

        // Auto-progress through stages

        logoContainer.addEventListener('click', () => {

        // Initialize app after user interaction
        function startApp() {
            if (userInteracted) return;
            userInteracted = true;
            
            // Hide splash screen
            splashOverlay.classList.add('hidden');
            
            // Initialize video player manager
            class VideoPlayerManager {
                constructor() {
                    this.observer = new IntersectionObserver((entries) => {
                        entries.forEach(entry => {
                            const iframe = entry.target.querySelector('iframe');
                            if (!iframe) return;

                            if (entry.isIntersecting) {
                                iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
                                if (iframe.src.includes('mute=1')) {
                                    setTimeout(() => {
                                        iframe.src = iframe.src.replace('mute=1', 'mute=0');
                                    }, 100);
                                }
                            } else {
                                iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
                            }
                        });
                    }, { threshold: 0.6 });
                }

                observe(element) {
                    this.observer.observe(element);
                }
            }

            videoPlayerManager = new VideoPlayerManager();
            
            // Load feed and setup videos
            loadFeed();
            
            // Setup all iframes for autoplay
            setupAllIframes();
        }

        // Setup all iframes for autoplay
        function setupAllIframes() {
            document.querySelectorAll('.video-container').forEach(container => {
                if (videoPlayerManager) {
                    videoPlayerManager.observe(container);
                }
            });
        }

        // Share function
        function shareVideo(videoId) {
            const shareUrl = `${window.location.origin}${window.location.pathname}?v=${videoId}`;
            navigator.clipboard.writeText(shareUrl).then(() => {
                // Show tooltip
                const tooltip = document.createElement('div');
                tooltip.className = 'share-tooltip';
                tooltip.textContent = 'Link copied!';
                document.body.appendChild(tooltip);
                tooltip.style.left = '50%';
                tooltip.style.top = '50%';
                tooltip.style.transform = 'translate(-50%, -50%)';
                setTimeout(() => tooltip.remove(), 1500);
            });
        }

        // YouTube Player Functions
        function loadVideoFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const videoId = urlParams.get('v');
            
            if (videoId) {
                youtubePlayerContainer.classList.add('active');
                youtubePlayer.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
            }
        }

        // Close player
        closePlayerBtn.addEventListener('click', () => {
            youtubePlayerContainer.classList.remove('active');
            youtubePlayer.src = '';
        });

        // Check URL on load
        loadVideoFromUrl();

        // Tap anywhere on splash to start
        splashOverlay.addEventListener('click', handleUserInteraction);
        if (tapHint) tapHint.addEventListener('click', handleUserInteraction);

        function handleUserInteraction(e) {
            startApp();
        }

        // Format time ago
        function timeAgo(dateString) {
            const now = new Date();
            const published = new Date(dateString);
            const diffMs = now - published;
            const diffHr = Math.floor(diffMs / (1000 * 60 * 60));
            
            if (diffHr < 24) return diffHr + ' hours ago';
            if (diffHr < 48) return 'yesterday';
            return Math.floor(diffHr / 24) + ' days ago';
        }

        // Fetch videos for a channel with error handling
        async function fetchChannelVideos(channel) {
            try {
                const channelUrl = `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${channel.id}&key=${API_KEY}`;
                const channelRes = await fetch(channelUrl);
                const channelData = await channelRes.json();
                
                if (!channelData.items || !channelData.items[0]) return [];
                
                const uploadsId = channelData.items[0].contentDetails.relatedPlaylists.uploads;
                
                // Increase maxResults to 6 per channel for more videos
                const playlistUrl = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${uploadsId}&maxResults=6&key=${API_KEY}`;
                const playlistRes = await fetch(playlistUrl);
                const playlistData = await playlistRes.json();
                
                // Filter out items without videoId (just in case)
                return playlistData.items
                    .filter(item => item.snippet && item.snippet.resourceId && item.snippet.resourceId.videoId)
                    .map(item => ({
                        ...channel,
                        type: 'video',
                        videoId: item.snippet.resourceId.videoId,
                        title: item.snippet.title,
                        publishedAt: item.snippet.publishedAt,
                        thumbnail: item.snippet.thumbnails.high?.url
                    }));
            } catch (e) {
                console.warn(`Failed for ${channel.name}`, e);
                return []; // skip failed channels
            }
        }

        // Create a feed card based on type
        function createFeedCard(item) {
            const card = document.createElement('div');
            card.className = 'feed-card';

            if (item.type === 'video') {
                card.innerHTML = `
                    <div class="card-header">
                        <div class="channel-icon">${item.icon || '📺'}</div>
                        <div class="channel-info">
                            <div class="channel-name">${item.name}</div>
                            <div class="post-time">${timeAgo(item.publishedAt)}</div>
                        </div>
                        <i class="fas fa-ellipsis-h"></i>
                    </div>
                    <div class="video-container" data-video-id="${item.videoId}">
                        <iframe 
                            src="https://www.youtube.com/embed/${item.videoId}?enablejsapi=1&autoplay=1&mute=1&controls=0&playsinline=1&loop=1&playlist=${item.videoId}"
                            allow="autoplay; fullscreen">
                        </iframe>
                        <div class="video-info-overlay">
                            <div class="video-title-small">${item.title.substring(0, 60)}${item.title.length > 60 ? '...' : ''}</div>
                            <div class="video-meta">

                        <span class="footer-item share-btn" data-video-id="${item.videoId}"><i class="fas fa-share"></i> Share</span>
                    </div>
                `;
                
                // Add share event listener
                const shareBtn = card.querySelector('.share-btn');

            } else if (item.type === 'post') {

        // Load and mix the feed
        async function loadFeed() {
            loadingEl.style.display = 'block';
            feedContainer.innerHTML = '';
            feedContainer.appendChild(loadingEl);

            // Fetch all channel videos in parallel
            const videoPromises = channels.map(fetchChannelVideos);
            const videoResults = await Promise.all(videoPromises);
            // Flatten and filter out any undefined (failed) items
            const allVideos = videoResults.flat().filter(v => v && v.videoId);

            // Mix content: interleave videos with community posts
            const mixedFeed = [];
            let videoIndex = 0;
            let postIndex = 0;

            // Create a longer feed (approx 30 items)
            for (let i = 0; i < 30; i++) {
                if (i % 3 === 0 && postIndex < communityPosts.length) {
                    mixedFeed.push({ ...communityPosts[postIndex], type: communityPosts[postIndex].type });
                    postIndex = (postIndex + 1) % communityPosts.length;
                } else if (videoIndex < allVideos.length) {
                    mixedFeed.push(allVideos[videoIndex]);
                    videoIndex++;
                } else {
                    // If we run out of videos, repeat community posts
                    if (postIndex < communityPosts.length) {
                        mixedFeed.push({ ...communityPosts[postIndex], type: communityPosts[postIndex].type });
                        postIndex = (postIndex + 1) % communityPosts.length;
                    }
                }
            }

            feedContainer.innerHTML = '';
            
            mixedFeed.forEach(item => {
                const card = createFeedCard(item);
                feedContainer.appendChild(card);
            });

            loadingEl.style.display = 'none';
            
            // Trigger a scroll event to start playing visible videos
            setTimeout(() => {
                window.dispatchEvent(new Event('scroll'));
            }, 500);
        }

        // Load live stories immediately
        loadLiveStories();

        // Handle popstate for back/forward navigation
        window.addEventListener('popstate', () => {
            const urlParams = new URLSearchParams(window.location.search);

            } else {
                youtubePlayerContainer.classList.remove('active');
                youtubePlayer.src = '';
            }
        });

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Goa Social · Home</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            line-height: 1.4;
            padding-bottom: 70px;
            min-height: 100vh;
            position: relative;
        }

        /* ===== SPLASH SCREEN WITH COOL ANIMATION ===== */
        .splash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 1s ease;
        }

        .splash-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .splash-stage {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .splash-stage.stage1 {
            animation: stage1Fade 2s forwards;
        }

        .splash-stage.stage2 {
            opacity: 0;
            animation: stage2Zoom 3s forwards;
        }

        .splash-stage.stage3 {
            opacity: 0;
            animation: stage3Reveal 2s forwards 5s;
        }

        @keyframes stage1Fade {
            0% { opacity: 1; transform: scale(1); }
            70% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0; transform: scale(2); }
        }

        @keyframes stage2Zoom {
            0% { opacity: 0; transform: scale(0.5); }
            20% { opacity: 1; transform: scale(1); }
            80% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0; transform: scale(1.5); }
        }

        @keyframes stage3Reveal {
            0% { opacity: 0; transform: translateY(50px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .space-bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at center, #0a0a2a 0%, #000 100%);
            overflow: hidden;
        }

        .stars {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(2px 2px at 20px 30px, #fff, rgba(0,0,0,0)),
                              radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                              radial-gradient(2px 2px at 80px 120px, #fff, rgba(0,0,0,0));
            background-size: 200px 200px;
            animation: starsMove 10s linear infinite;
        }

        @keyframes starsMove {
            from { transform: translateY(0); }
            to { transform: translateY(-200px); }
        }

        .coconut-tree {
            position: relative;
            width: 100px;
            height: 150px;
            margin: 0 auto;
        }

        .tree-trunk {
            width: 20px;
            height: 100px;
            background: #8B5A2B;
            margin: 0 auto;
            border-radius: 10px;
        }

        .tree-leaves {
            position: relative;
            top: -30px;
            width: 80px;
            height: 80px;
            margin: 0 auto;
            background: #2E8B57;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            transform: rotate(10deg);
        }

        .tree-leaves::before {
            content: '';
            position: absolute;
            width: 60px;
            height: 60px;
            background: #3CB371;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            transform: rotate(-20deg);
            left: 10px;
            top: 10px;
        }

        .splash-logo {
            width: 120px;
            height: 120px;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(255, 107, 43, 0.3);
            border: 3px solid #FF6B2B;
        }

        .splash-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .tap-hint {
            position: absolute;
            bottom: 50px;
            color: #FF6B2B;
            font-size: 1.2rem;
            animation: pulse 1.5s infinite;
            cursor: pointer;
            z-index: 10001;
        }

        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.6; transform: scale(1); }
        }

        /* ===== YOUTUBE PLAYER ===== */
        .youtube-player-container {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            z-index: 1000;
            background: #000;
            display: none;
            padding: 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .youtube-player-container.active {
            display: block;
        }

        .player-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            max-width: 800px;
            margin: 0 auto;
        }

        .player-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .close-player {
            position: absolute;
            top: -40px;
            right: 10px;
            background: #FF6B2B;
            color: #000;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            z-index: 1001;
        }

        /* ===== HEADER ===== */
        .app-header {
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 12px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2A2A2A;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .logo-crop {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            overflow: hidden;
            background: #FF6B2B;
            box-shadow: 0 4px 12px rgba(255, 107, 43, 0.3);
            flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-crop img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #FF6B2B, #FFB347);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 20px;
            color: #A0A0A0;
        }

        .header-actions i {
            font-size: 1.3rem;
        }

        /* ===== STORIES ===== */
        .stories-section {
            padding: 16px 16px 12px 16px;
            border-bottom: 1px solid #2A2A2A;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #FFFFFF;
        }

        .section-header a {
            color: #FF6B2B;
            font-size: 0.9rem;
            text-decoration: none;
            font-weight: 500;
        }

        .stories-scroll {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 4px;
        }

        .stories-scroll::-webkit-scrollbar {
            display: none;
        }

        .story-item {
            min-width: 90px;
            text-align: center;
        }

        .story-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #1A1A1A;
            position: relative;
            overflow: hidden;
            margin: 0 auto 8px auto;
            border: 2px solid #FF6B2B;
        }

        .story-avatar.live::after {
            content: 'LIVE';
            position: absolute;
            bottom: 4px;
            right: 4px;
            background: #FF0000;
            color: white;
            font-size: 0.55rem;
            padding: 2px 6px;
            border-radius: 20px;
            font-weight: 600;
        }

        .story-avatar-inner {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            background: #222;
            color: #FF6B2B;
        }

        .story-label {
            font-size: 0.75rem;
            color: #A0A0A0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ===== CATEGORIES ===== */
        .categories-section {
            padding: 12px 16px;
            border-bottom: 1px solid #2A2A2A;
        }

        .chips-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .chips-scroll::-webkit-scrollbar {
            display: none;
        }

        .chip {
            background: #1A1A1A;
            color: #FFFFFF;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            white-space: nowrap;
            border: 1px solid #2A2A2A;
            font-weight: 500;
        }

        .chip.active {
            background: #FF6B2B;
            color: #000000;
            font-weight: 600;
            border: none;
        }

        /* ===== FEED ===== */
        .feed-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px 0 20px 0;
        }

        /* Video cards - enhanced Shorts style */
        .feed-card {
            background: #121212;
            border-radius: 28px;
            margin: 0 16px 24px 16px;
            overflow: hidden;
            box-shadow: 0 12px 30px rgba(0,0,0,0.8);
            border: 1px solid #2A2A2A;
            position: relative;
        }

        /* Glow effect for video cards */
        .feed-card::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 28px;
            padding: 1px;
            background: linear-gradient(145deg, #FF6B2B, transparent 70%);
            -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: xor;
            mask-composite: exclude;
            pointer-events: none;
        }

        .card-header {
            display: flex;
            align-items: center;
            padding: 16px;
            gap: 12px;
            background: rgba(0,0,0,0.3);
            backdrop-filter: blur(5px);
            border-bottom: 1px solid rgba(255,107,43,0.2);
        }

        .channel-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: #1A1A1A;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #FF6B2B;
            border: 1px solid #2A2A2A;
        }

        .channel-info {
            flex: 1;
        }

        .channel-name {
            font-weight: 600;
            font-size: 1rem;
            color: #FFFFFF;
        }

        .post-time {
            font-size: 0.7rem;
            color: #A0A0A0;
            margin-top: 2px;
        }

        .card-header i {
            color: #A0A0A0;
            font-size: 1.2rem;
        }

        .card-title {
            padding: 0 16px 12px 16px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #FFFFFF;
        }

        .card-description {
            padding: 0 16px 16px 16px;
            color: #CCCCCC;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* Video container */
        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            aspect-ratio: 9/16;
            max-height: 500px;
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none;
        }

        /* Image placeholder */
        .image-placeholder {
            width: 100%;
            height: 200px;
            background: linear-gradient(145deg, #1A1A1A, #0A0A0A);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #FF6B2B;
            font-size: 3rem;
            border-top: 1px solid #2A2A2A;
            border-bottom: 1px solid #2A2A2A;
        }

        /* Card footer - now with share button */
        .card-footer {
            padding: 16px;
            display: flex;
            gap: 24px;
            border-top: 1px solid #2A2A2A;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        .footer-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #A0A0A0;
            font-size: 0.9rem;
            cursor: pointer;
            transition: color 0.2s;
        }

        .footer-item:hover {
            color: #FF6B2B;
        }

        .footer-item i.fa-heart { color: #FF6B2B; }
        .footer-item i.fa-comment { color: #3B82F6; }
        .footer-item i.fa-share { color: #FFB347; }

        /* Share tooltip */
        .share-tooltip {
            position: fixed;
            background: #FF6B2B;
            color: #000;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 600;
            z-index: 10000;
            pointer-events: none;
            animation: tooltipFade 1.5s forwards;
        }

        @keyframes tooltipFade {
            0% { opacity: 0; transform: translateY(10px); }
            20% { opacity: 1; transform: translateY(0); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-10px); }
        }

        .event-details {
            padding: 0 16px 16px 16px;
            display: flex;
            gap: 20px;
            color: #FF6B2B;
            font-size: 0.9rem;
        }

        .event-details span i {
            margin-right: 6px;
            color: #A0A0A0;
        }

        .video-info-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px 16px 16px;
            background: linear-gradient(to top, rgba(0,0,0,0.95), transparent);
            color: white;
            pointer-events: none;
        }

        .video-title-small {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: #FFFFFF;
        }

        .video-meta {
            font-size: 0.7rem;
            color: #A0A0A0;
            display: flex;
            gap: 12px;
        }

        .loading-indicator {
            text-align: center;
            padding: 30px;
            color: #FF6B2B;
        }

        .loading-indicator i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(18px);
            border-top: 1px solid #2A2A2A;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 10px 12px 10px;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #A0A0A0;
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 30px;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-item i {
            font-size: 1.5rem;
            margin-bottom: 2px;
        }

        .nav-item.active {
            color: #FF6B2B;
        }

        .nav-item.active i {
            text-shadow: 0 0 10px rgba(255, 107, 43, 0.3);
        }
    </style>
</head>

            splashOverlay.classList.add('hidden');
            
            // Initialize video player manager
            class VideoPlayerManager {
                constructor() {
                    this.observer = new IntersectionObserver((entries) => {
                        entries.forEach(entry => {
                            const iframe = entry.target.querySelector('iframe');
                            if (!iframe) return;

                            if (entry.isIntersecting) {
                                iframe.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
                                if (iframe.src.includes('mute=1')) {
                                    setTimeout(() => {
                                        iframe.src = iframe.src.replace('mute=1', 'mute=0');
                                    }, 100);
                                }
                            } else {
                                iframe.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
                            }
                        });
                    }, { threshold: 0.6 });
                }

                observe(element) {
                    this.observer.observe(element);
                }
            }

            videoPlayerManager = new VideoPlayerManager();
            
            // Load feed and setup videos
            loadFeed();
            
            // Setup all iframes for autoplay
            setupAllIframes();
        }

        // Setup all iframes for autoplay
        function setupAllIframes() {
            document.querySelectorAll('.video-container').forEach(container => {
                if (videoPlayerManager) {
                    videoPlayerManager.observe(container);
                }
            });
        }

        // Share function
        function shareVideo(videoId) {
            const shareUrl = `${window.location.origin}${window.location.pathname}?v=${videoId}`;
            navigator.clipboard.writeText(shareUrl).then(() => {
                // Show tooltip
                const tooltip = document.createElement('div');
                tooltip.className = 'share-tooltip';
                tooltip.textContent = 'Link copied!';
                document.body.appendChild(tooltip);
                tooltip.style.left = '50%';
                tooltip.style.top = '50%';
                tooltip.style.transform = 'translate(-50%, -50%)';
                setTimeout(() => tooltip.remove(), 1500);
            });
        }

        // YouTube Player Functions
        function loadVideoFromUrl() {
            const urlParams = new URLSearchParams(window.location.search);
            const videoId = urlParams.get('v');
            
            if (videoId) {
                youtubePlayerContainer.classList.add('active');
                youtubePlayer.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
            }
        }

        // Close player
        closePlayerBtn.addEventListener('click', () => {
            youtubePlayerContainer.classList.remove('active');
            youtubePlayer.src = '';
        });

        // Check URL on load
        loadVideoFromUrl();

        // Splash screen start handlers
        function handleUserInteraction(e) {
            startApp();
        }

        splashOverlay.addEventListener('click', handleUserInteraction);
        if (tapHint) tapHint.addEventListener('click', handleUserInteraction);

        // Also allow starting by tapping logo in header
        document.getElementById('logoContainer').addEventListener('click', () => {
            if (!userInteracted) {
                startApp();
            }
        });

        // Format time ago
        function timeAgo(dateString) {
            const now = new Date();
            const published = new Date(dateString);
            const diffMs = now - published;
            const diffHr = Math.floor(diffMs / (1000 * 60 * 60));
            
            if (diffHr < 24) return diffHr + ' hours ago';
            if (diffHr < 48) return 'yesterday';
            return Math.floor(diffHr / 24) + ' days ago';
        }

        // Fetch videos for a channel
        async function fetchChannelVideos(channel) {
            try {
                const channelUrl = `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${channel.id}&key=${API_KEY}`;
                const channelRes = await fetch(channelUrl);
                const channelData = await channelRes.json();
                
                if (!channelData.items || !channelData.items[0]) return [];
                
                const uploadsId = channelData.items[0].contentDetails.relatedPlaylists.uploads;
                
                const playlistUrl = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&playlistId=${uploadsId}&maxResults=4&key=${API_KEY}`;
                const playlistRes = await fetch(playlistUrl);
                const playlistData = await playlistRes.json();
                
                return playlistData.items.map(item => ({
                    ...channel,
                    type: 'video',
                    videoId: item.snippet.resourceId.videoId,
                    title: item.snippet.title,
                    publishedAt: item.snippet.publishedAt,
                    thumbnail: item.snippet.thumbnails.high?.url
                }));
            } catch (e) {
                console.warn(`Failed for ${channel.name}`, e);
                return [];
            }
        }

        // Create a feed card based on type
        function createFeedCard(item) {
            const card = document.createElement('div');
            card.className = 'feed-card';

            if (item.type === 'video') {
                card.innerHTML = `
                    <div class="card-header">
                        <div class="channel-icon">${item.icon || '📺'}</div>
                        <div class="channel-info">
                            <div class="channel-name">${item.name}</div>
                            <div class="post-time">${timeAgo(item.publishedAt)}</div>
                        </div>
                        <i class="fas fa-ellipsis-h"></i>
                    </div>
                    <div class="video-container" data-video-id="${item.videoId}">
                        <iframe 
                            src="https://www.youtube.com/embed/${item.videoId}?enablejsapi=1&autoplay=1&mute=1&controls=0&playsinline=1&loop=1&playlist=${item.videoId}"
                            allow="autoplay; fullscreen">
                        </iframe>
                        <div class="video-info-overlay">
                            <div class="video-title-small">${item.title.substring(0, 60)}${item.title.length > 60 ? '...' : ''}</div>
                            <div class="video-meta">
                                <span><i class="fas fa-eye"></i> Trending</span>
                                <span><i class="fas fa-heart"></i> 1.2k</span>
                            </div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <span class="footer-item like-btn"><i class="fas fa-heart"></i> 1.2k</span>
                        <span class="footer-item comment-btn"><i class="fas fa-comment"></i> 89</span>
                        <span class="footer-item share-btn" data-video-id="${item.videoId}"><i class="fas fa-share"></i> Share</span>
                    </div>
                `;
                
                // Add share event listener
                const shareBtn = card.querySelector('.share-btn');
                shareBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    shareVideo(item.videoId);
                });
                
                // Observe for autoplay if app has started
                const videoContainer = card.querySelector('.video-container');
                if (videoContainer && videoPlayerManager) {
                    videoPlayerManager.observe(videoContainer);
                }
                
            } else if (item.type === 'post') {
                card.innerHTML = `
                    <div class="card-header">
                        <div class="channel-icon">${item.icon || '👤'}</div>
                        <div class="channel-info">
                            <div class="channel-name">${item.author}</div>
                            <div class="post-time">${item.time}</div>
                        </div>
                        <i class="fas fa-ellipsis-h"></i>
                    </div>
                    <div class="card-title">${item.title}</div>
                    <div class="card-description">${item.content}</div>
                    ${item.image ? '<div class="image-placeholder"><i class="fas fa-umbrella-beach"></i></div>' : ''}
                    <div class="card-footer">
                        <span class="footer-item"><i class="fas fa-heart"></i> ${item.likes}</span>
                        <span class="footer-item"><i class="fas fa-comment"></i> ${item.comments}</span>
                        <span class="footer-item"><i class="fas fa-share"></i> Share</span>
                    </div>
                `;
            } else if (item.type === 'event') {
                card.innerHTML = `
                    <div class="card-header">
                        <div class="channel-icon"><i class="fas fa-calendar-alt"></i></div>
                        <div class="channel-info">
                            <div class="channel-name">Goa Events</div>
                            <div class="post-time">Featured</div>
                        </div>
                        <i class="fas fa-ellipsis-h"></i>
                    </div>
                    <div class="image-placeholder">
                        <i class="fas fa-music"></i>
                    </div>
                    <div class="card-title">${item.title}</div>
                    <div class="event-details">
                        <span><i class="fas fa-map-pin"></i> ${item.venue}</span>
                        <span><i class="fas fa-clock"></i> ${item.date}</span>
                    </div>
                    <div class="card-footer">
                        <span class="footer-item"><i class="fas fa-user-plus"></i> ${item.attendees}</span>
                        <span class="footer-item"><i class="fas fa-tag"></i> ${item.price}</span>
                    </div>
                `;
            }

            return card;
        }

        // Load live stories
        function loadLiveStories() {
            const lives = [
                { name: 'Goa News Live', icon: '📺' },
                { name: 'Beach Party', icon: '🎵' },
                { name: 'Mass at Church', icon: '⛪' },
                { name: 'Market Vibes', icon: '🛍️' }
            ];
            
            liveStories.innerHTML = '';
            lives.forEach(live => {
                const story = document.createElement('div');
                story.className = 'story-item';
                story.innerHTML = `
                    <div class="story-avatar live">
                        <div class="story-avatar-inner">
                            ${live.icon}
                        </div>
                    </div>
                    <div class="story-label">${live.name}</div>
                `;
                liveStories.appendChild(story);
            });
        }

        // Load and mix the feed
        async function loadFeed() {
            loadingEl.style.display = 'block';
            feedContainer.innerHTML = '';
            feedContainer.appendChild(loadingEl);

            const videoPromises = channels.map(fetchChannelVideos);
            const videoResults = await Promise.all(videoPromises);
            const allVideos = videoResults.flat();

            const mixedFeed = [];
            let videoIndex = 0;
            let postIndex = 0;

            for (let i = 0; i < 20; i++) {
                if (i % 3 === 0 && postIndex < communityPosts.length) {
                    mixedFeed.push({ ...communityPosts[postIndex], type: communityPosts[postIndex].type });
                    postIndex = (postIndex + 1) % communityPosts.length;
                } else if (videoIndex < allVideos.length) {
                    mixedFeed.push(allVideos[videoIndex]);
                    videoIndex++;
                }
            }

            feedContainer.innerHTML = '';
            
            mixedFeed.forEach(item => {
                const card = createFeedCard(item);
                feedContainer.appendChild(card);
            });

            loadingEl.style.display = 'none';
            
            // Trigger a scroll event to start playing visible videos
            setTimeout(() => {
                window.dispatchEvent(new Event('scroll'));
            }, 500);
        }

        // Load live stories immediately
        loadLiveStories();

        // Handle popstate for back/forward navigation
        window.addEventListener('popstate', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const videoId = urlParams.get('v');
            
            if (videoId) {
                youtubePlayerContainer.classList.add('active');
                youtubePlayer.src = `https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0`;
            } else {
                youtubePlayerContainer.classList.remove('active');
                youtubePlayer.src = '';
            }
        });
    </script>
</body>
</html>

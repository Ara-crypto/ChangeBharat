<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Goa Social</title>

<!-- SPEED TRICKS -->
<link rel="preconnect" href="https://www.youtube.com">
<link rel="preconnect" href="https://i.ytimg.com">
<link rel="preconnect" href="https://s.ytimg.com">

<link rel="dns-prefetch" href="https://youtube.com">
<link rel="dns-prefetch" href="https://i.ytimg.com">

<style>

*{margin:0;padding:0;box-sizing:border-box}

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f0f2f5;
color:#111;
}

header{
position:sticky;
top:0;
background:white;
padding:16px;
font-size:22px;
font-weight:700;
color:#1877f2;
box-shadow:0 2px 8px rgba(0,0,0,.08);
z-index:10;
}

.feed{
max-width:600px;
margin:auto;
}

.card{
margin:12px;
border-radius:14px;
overflow:hidden;
background:white;
box-shadow:0 2px 8px rgba(0,0,0,.12);
}

.video{
aspect-ratio:9/16;
background:black;
position:relative;
}

.video iframe{
width:100%;
height:100%;
border:none;
}

.splash{
position:fixed;
inset:0;
background:linear-gradient(#1877f2,#0a5cff);
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
color:white;
z-index:1000;
}

.logo{
font-size:40px;
font-weight:800;
animation:zoom 2s ease forwards;
}

@keyframes zoom{
0%{transform:scale(.6);opacity:0}
100%{transform:scale(1);opacity:1}
}

.tap{
margin-top:18px;
opacity:.9;
font-size:18px;
}

</style>

</head>

<body>

<div class="splash" id="splash">
<div class="logo">Goa Social</div>
<div class="tap">Tap anywhere to begin</div>
</div>

<header>Goa Social</header>

<div class="feed" id="feed"></div>

<script>

const videoIDs=[
"ysz5S6PUM-U",
"aqz-KE-bpKQ",
"ScMzIvxBSi4",
"9bZkp7q19f0",
"fLexgOxsZu0",
"JGwWNGJdvx8",
"kJQP7kiw5Fk"
]

const feed=document.getElementById("feed")

videoIDs.forEach(id=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`
<div class="video">
<iframe
loading="lazy"
allow="autoplay"
src="https://www.youtube.com/embed/${id}?enablejsapi=1&autoplay=1&mute=1&playsinline=1&controls=0&loop=1&playlist=${id}&vq=small&rel=0&modestbranding=1"
></iframe>
</div>
`

feed.appendChild(card)

})

let userInteracted=false
let currentVideo=null

const observer=new IntersectionObserver(entries=>{

entries.forEach(entry=>{

const iframe=entry.target.querySelector("iframe")
if(!iframe)return

if(entry.isIntersecting){

if(currentVideo && currentVideo!==iframe){

currentVideo.contentWindow.postMessage(
'{"event":"command","func":"pauseVideo"}',"*"
)

currentVideo.contentWindow.postMessage(
'{"event":"command","func":"mute"}',"*"
)

}

iframe.contentWindow.postMessage(
'{"event":"command","func":"playVideo"}',"*"
)

if(userInteracted){

iframe.contentWindow.postMessage(
'{"event":"command","func":"unMute"}',"*"
)

}

currentVideo=iframe

}

else{

iframe.contentWindow.postMessage(
'{"event":"command","func":"pauseVideo"}',"*"
)

iframe.contentWindow.postMessage(
'{"event":"command","func":"mute"}',"*"
)

}

})

},{threshold:.65})

document.querySelectorAll(".video")
.forEach(v=>observer.observe(v))

document.getElementById("splash")
.addEventListener("click",()=>{

userInteracted=true

document.getElementById("splash").style.display="none"

if(currentVideo){

currentVideo.contentWindow.postMessage(
'{"event":"command","func":"unMute"}',"*"
)

}

})

</script>

</body>
</html>

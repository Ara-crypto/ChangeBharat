<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Goa Social · Fresh Feed</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #f0f2f5, #e4e6eb);
            color: #1c1e21;
            line-height: 1.4;
            padding-bottom: 70px;
            min-height: 100vh;
            position: relative;
        }

        /* Subtle coconut tree decorations */
        .coconut-left {
            position: fixed;
            bottom: 80px;
            left: 10px;
            font-size: 4rem;
            opacity: 0.15;
            transform: rotate(-10deg);
            z-index: 0;
            pointer-events: none;
            animation: swayLeft 6s ease-in-out infinite;
        }

        .coconut-right {
            position: fixed;
            bottom: 80px;
            right: 10px;
            font-size: 4rem;
            opacity: 0.15;
            transform: rotate(10deg) scaleX(-1);
            z-index: 0;
            pointer-events: none;
            animation: swayRight 6s ease-in-out infinite;
        }

        @keyframes swayLeft {
            0%, 100% { transform: rotate(-10deg); }
            50% { transform: rotate(-5deg); }
        }

        @keyframes swayRight {
            0%, 100% { transform: rotate(10deg) scaleX(-1); }
            50% { transform: rotate(5deg) scaleX(-1); }
        }

        /* ===== SPLASH SCREEN - PROFESSIONAL ===== */
        .splash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: #000000;
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease;
        }

        .splash-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .splash-stage {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Stage 1: Logo zoom */
        .stage1 {
            animation: logoZoom 1.5s forwards;
        }

        @keyframes logoZoom {
            0% { transform: scale(0.5); opacity: 0; }
            30% { transform: scale(1.2); opacity: 1; }
            60% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.5); opacity: 0; }
        }

        .splash-logo {
            width: 140px;
            height: 140px;
            border-radius: 35px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
        }

        .splash-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Stage 2: Professional Loading Animation */
        .stage2 {
            opacity: 0;
            animation: fadeIn 0.5s forwards 1.5s;
            background: #000000;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .professional-loader {
            text-align: center;
            color: white;
        }

        .loader-circle {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #1877f2;
            border-right: 3px solid #1877f2;
            border-radius: 50%;
            animation: spin 1s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(24,119,242,0.3);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loader-progress {
            width: 200px;
            height: 2px;
            background: rgba(255,255,255,0.1);
            margin: 20px auto;
            border-radius: 10px;
            overflow: hidden;
        }

        .loader-progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #1877f2, #0a5cff);
            animation: progress 10s linear forwards;
            box-shadow: 0 0 20px #1877f2;
        }

        @keyframes progress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .loader-text {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #fff, #aaccff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .loader-sub {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 1px;
        }

        /* Stage 3: Tap to begin */
        .stage3 {
            opacity: 0;
            animation: fadeIn 0.5s forwards;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            display: none;
        }

        .tap-content {
            text-align: center;
        }

        .tap-logo {
            width: 100px;
            height: 100px;
            border-radius: 25px;
            overflow: hidden;
            margin: 0 auto 20px;
            border: 2px solid #1877f2;
            box-shadow: 0 0 30px rgba(24,119,242,0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 30px rgba(24,119,242,0.5); }
            50% { box-shadow: 0 0 60px rgba(24,119,242,0.8); }
        }

        .tap-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .tap-message {
            font-size: 1.5rem;
            color: white;
            margin-bottom: 10px;
            font-weight: 300;
        }

        .tap-hint {
            color: rgba(255,255,255,0.7);
            font-size: 1rem;
        }

        .tap-hint i {
            color: #1877f2;
            margin-right: 8px;
        }

        /* ===== YOUTUBE PLAYER ===== */
        .youtube-player-container {
            position: fixed;
            top: 60px;
            left: 0;
            right: 0;
            z-index: 1000;
            background: white;
            display: none;
            padding: 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .youtube-player-container.active {
            display: block;
        }

        .player-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            max-width: 800px;
            margin: 0 auto;
        }

        .player-wrapper iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .close-player {
            position: absolute;
            top: -40px;
            right: 10px;
            background: #1877f2;
            color: white;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            z-index: 1001;
        }

        /* ===== HEADER ===== */
        .app-header {
            background: white;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 12px 18px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e4e6eb;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .logo-crop {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            overflow: hidden;
            background: #1877f2;
            flex-shrink: 0;
            border: 1px solid #e4e6eb;
        }

        .logo-crop img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .logo-text {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #1877f2;
        }

        .header-actions {
            display: flex;
            gap: 20px;
            color: #65676b;
        }

        .header-actions i {
            font-size: 1.3rem;
        }

        /* ===== STORIES ===== */
        .stories-section {
            padding: 16px 16px 12px 16px;
            background: white;
            margin: 8px 0;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .section-header h3 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #1c1e21;
        }

        .section-header a {
            color: #1877f2;
            font-size: 0.9rem;
            text-decoration: none;
            font-weight: 500;
        }

        .stories-scroll {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 4px;
        }

        .stories-scroll::-webkit-scrollbar {
            display: none;
        }

        .story-item {
            min-width: 90px;
            text-align: center;
        }

        .story-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(145deg, #e4e6eb, #d8dade);
            position: relative;
            overflow: hidden;
            margin: 0 auto 8px auto;
            border: 3px solid #1877f2;
        }

        .story-avatar.live::after {
            content: 'LIVE';
            position: absolute;
            bottom: 4px;
            right: 4px;
            background: #ff0000;
            color: white;
            font-size: 0.55rem;
            padding: 2px 6px;
            border-radius: 20px;
            font-weight: 600;
        }

        .story-avatar-inner {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            background: white;
            color: #1877f2;
        }

        .story-label {
            font-size: 0.75rem;
            color: #65676b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ===== CATEGORIES ===== */
        .categories-section {
            padding: 12px 16px;
            background: white;
            margin: 8px 0;
        }

        .chips-scroll {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .chips-scroll::-webkit-scrollbar {
            display: none;
        }

        .chip {
            background: #f0f2f5;
            color: #1c1e21;
            padding: 8px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            white-space: nowrap;
            border: 1px solid #e4e6eb;
            font-weight: 500;
        }

        .chip.active {
            background: #1877f2;
            color: white;
            font-weight: 600;
            border: none;
        }

        /* ===== FEED ===== */
        .feed-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 8px 0 20px 0;
        }

        .feed-card {
            background: white;
            border-radius: 16px;
            margin: 0 12px 16px 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border: 1px solid #e4e6eb;
        }

        .card-header {
            display: flex;
            align-items: center;
            padding: 14px;
            gap: 12px;
        }

        .channel-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: #f0f2f5;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #1877f2;
            border: 1px solid #e4e6eb;
        }

        .channel-info {
            flex: 1;
        }

        .channel-name {
            font-weight: 600;
            font-size: 1rem;
            color: #1c1e21;
        }

        .post-time {
            font-size: 0.7rem;
            color: #65676b;
            margin-top: 2px;
        }

        .card-header i {
            color: #65676b;
            font-size: 1.2rem;
        }

        .card-title {
            padding: 0 14px 10px 14px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #1c1e21;
        }

        .card-description {
            padding: 0 14px 14px 14px;
            color: #65676b;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        /* Video container */
        .video-container {
            position: relative;
            width: 100%;
            background: #000;
            aspect-ratio: 9/16;
            max-height: 500px;
        }

        .video-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Image placeholder */
        .image-placeholder {
            width: 100%;
            height: 200px;
            background: linear-gradient(145deg, #f0f2f5, #e4e6eb);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1877f2;
            font-size: 3rem;
            border-top: 1px solid #e4e6eb;
            border-bottom: 1px solid #e4e6eb;
        }

        /* Card footer */
        .card-footer {
            padding: 14px;
            display: flex;
            gap: 24px;
            border-top: 1px solid #e4e6eb;
        }

        .footer-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #65676b;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .footer-item i.fa-heart { color: #f23b5c; }
        .footer-item i.fa-comment { color: #1877f2; }
        .footer-item i.fa-share { color: #42b72a; }

        /* Share popup */
        .share-popup {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-radius: 24px 24px 0 0;
            padding: 20px;
            z-index: 10001;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
        }

        .share-popup.visible {
            transform: translateY(0);
        }

        .share-popup-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .share-popup-header h3 {
            font-size: 1.2rem;
            color: #1c1e21;
        }

        .close-share {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #65676b;
            cursor: pointer;
        }

        .share-options {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            text-align: center;
        }

        .share-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .share-icon {
            width: 60px;
            height: 60px;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
        }

        .share-icon.whatsapp { background: #25D366; color: white; }
        .share-icon.instagram { background: linear-gradient(45deg, #f09433, #d62976, #962fbf); color: white; }
        .share-icon.facebook { background: #1877f2; color: white; }
        .share-icon.copy { background: #f0f2f5; color: #1c1e21; }

        .share-option span {
            font-size: 0.8rem;
            color: #65676b;
        }

        .share-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 10000;
            display: none;
        }

        .share-overlay.visible {
            display: block;
        }

        .event-details {
            padding: 0 14px 14px 14px;
            display: flex;
            gap: 20px;
            color: #1877f2;
            font-size: 0.9rem;
        }

        .event-details span i {
            margin-right: 6px;
            color: #65676b;
        }

        .video-info-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px 14px 14px;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            color: white;
            pointer-events: none;
        }

        .video-title-small {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 4px;
            color: white;
        }

        .video-meta {
            font-size: 0.7rem;
            color: #ccc;
            display: flex;
            gap: 12px;
        }

        .loading-indicator {
            text-align: center;
            padding: 30px;
            color: #1877f2;
        }

        .loading-indicator i {
            font-size: 2rem;
            animation: spin 1s linear infinite;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            border-top: 1px solid #e4e6eb;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 8px 10px 12px 10px;
            z-index: 1000;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #65676b;
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 30px;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .nav-item i {
            font-size: 1.5rem;
            margin-bottom: 2px;
        }

        .nav-item.active {
            color: #1877f2;
        }
    </style>
</head>
<body>
    <!-- Coconut tree decorations -->
    <div class="coconut-left">🌴</div>
    <div class="coconut-right">🌴</div>

    <!-- Splash Screen with three stages -->
    <div class="splash-overlay" id="splashOverlay">
        <!-- Stage 1: Logo zoom (1.5s) -->
        <div class="splash-stage stage1" id="stage1">
            <div class="splash-logo">
                <img src="https://i.imgur.com/u5kGI2s.jpeg" alt="Goa Social">
            </div>
        </div>

        <!-- Stage 2: Professional Loading Animation -->
        <div class="splash-stage stage2" id="stage2">
            <div class="professional-loader">
                <div class="loader-circle"></div>
                <div class="loader-progress">
                    <div class="loader-progress-bar"></div>
                </div>
                <div class="loader-text">GOA SOCIAL</div>
                <div class="loader-sub">loading experience</div>
            </div>
        </div>

        <!-- Stage 3: Tap to begin -->
        <div class="splash-stage stage3" id="stage3">
            <div class="tap-content">
                <div class="tap-logo">
                    <img src="https://i.imgur.com/u5kGI2s.jpeg" alt="Goa Social">
                </div>
                <div class="tap-message">Welcome to Goa Social</div>
                <div class="tap-hint">
                    <i class="fas fa-hand-pointer"></i> Tap anywhere to begin
                </div>
            </div>
        </div>
    </div>

    <!-- Share Popup -->
    <div class="share-overlay" id="shareOverlay"></div>
    <div class="share-popup" id="sharePopup">
        <div class="share-popup-header">
            <h3>Share to</h3>
            <button class="close-share" id="closeShare">&times;</button>
        </div>
        <div class="share-options">
            <div class="share-option" data-share="whatsapp">
                <div class="share-icon whatsapp"><i class="fab fa-whatsapp"></i></div>
                <span>WhatsApp</span>
            </div>
            <div class="share-option" data-share="instagram">
                <div class="share-icon instagram"><i class="fab fa-instagram"></i></div>
                <span>Instagram</span>
            </div>
            <div class="share-option" data-share="facebook">
                <div class="share-icon facebook"><i class="fab fa-facebook-f"></i></div>
                <span>Facebook</span>
            </div>
            <div class="share-option" data-share="copy">
                <div class="share-icon copy"><i class="fas fa-link"></i></div>
                <span>Copy Link</span>
            </div>
        </div>
    </div>

    <!-- YouTube Player Container (for shared videos) -->
    <div class="youtube-player-container" id="youtubePlayerContainer">
        <div class="player-wrapper">
            <button class="close-player" id="closePlayerBtn">&times;</button>
            <iframe id="youtubePlayer" allow="autoplay; fullscreen"></iframe>
        </div>
    </div>

    <!-- Header -->
    <header class="app-header">
        <div class="logo-container" id="logoContainer">
            <div class="logo-crop">
                <img src="https://i.imgur.com/u5kGI2s.jpeg" alt="Goa Social">
            </div>
            <span class="logo-text">Goa Social</span>
        </div>
        <div class="header-actions">
            <i class="fas fa-search"></i>
            <i class="fas fa-bell"></i>
        </div>
    </header>

    <!-- Stories / Live Section -->
    <div class="stories-section">
        <div class="section-header">
            <h3>LIVE NOW</h3>
            <a href="#">View all <i class="fas fa-chevron-right" style="font-size: 0.7rem;"></i></a>
        </div>
        <div class="stories-scroll" id="liveStories">
            <!-- Populated by JS -->
        </div>
    </div>

    <!-- Categories -->
    <div class="categories-section">
        <div class="chips-scroll">
            <span class="chip active">All</span>
            <span class="chip">Trending</span>
            <span class="chip">Local</span>
            <span class="chip">News</span>
            <span class="chip">Videos</span>
            <span class="chip">Events</span>
            <span class="chip">Food</span>
            <span class="chip">Travel</span>
        </div>
    </div>

    <!-- Main Feed Container -->
    <div class="feed-container" id="feedContainer">
        <div class="loading-indicator" id="loading">
            <i class="fas fa-circle-notch"></i>
            <p style="margin-top: 12px;">loading goa feed...</p>
        </div>
    </div>

    <!-- Bottom Navigation -->
    <nav class="bottom-nav">
        <button class="nav-item active" onclick="window.location.href='index.html'">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </button>
        <button class="nav-item" onclick="window.location.href='dating.html'">
            <i class="fas fa-heart"></i>
            <span>Dating</span>
        </button>
        <button class="nav-item" onclick="window.location.href='business.html'">
            <i class="fas fa-store"></i>
            <span>Business</span>
        </button>
        <button class="nav-item" onclick="window.location.href='chats.html'">
            <i class="fas fa-comment-dots"></i>
            <span>Chats</span>
        </button>
        <button class="nav-item" onclick="window.location.href='profile.html'">
            <i class="fas fa-user"></i>
            <span>Profile</span>
        </button>
    </nav>

    <script>
        // Configuration
        const API_KEY = 'AIzaSyDGHXHuPiHAfJGin_c2-LF4FZ5IBMYLNK4';
        
        // Force 360p quality in YouTube embed
        const QUALITY_PARAM = '&vq=small'; // 360p equivalent
        
        // Expanded channels list

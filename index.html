<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Goa Shorts Feed</title>
<style>
body{
margin:0;
background:black;
font-family:Arial;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}
.video{
height:100vh;
scroll-snap-align:start;
position:relative;
}
iframe{
width:100%;
height:100%;
border:none;
}
.loading{
color:white;
text-align:center;
padding:30px;
font-size:18px;
}
</style>
</head>
<body>
<div id="feed"></div>
<div class="loading" id="loading">Loading more videos...</div>

<script>
/* ====== CONFIG ====== */
// Your provided API key
const API_KEY = "AIzaSyDGHXHuPiHAfJGin_c2-LF4FZ5IBMYLNK4";

const channels = [
"UCJb1MeQClvGeSMeBSVLKnDQ", // Prudent Media Goa
"UC9CYT9gSNLevX5ey2_6CK0Q", // Goa365
"UCAX1AR_JYH8T6uFJ-D44PlA", // RDX Goa
"UCYtM9s4m2vQy3yC8o8wJ5dw", // Alert Goans
"UC3pJf8n2v8YbZ7y4q7o8S2g", // InGoa News
"UCfXhFzN9C7g0s4xkL3rT5tw"  // Gomantak TV
];

/* ====== VARIABLES ====== */
let feed = document.getElementById("feed");
let videoPool = [];
let loading = false;
let pageToken = '';        // for pagination if needed later
let loadedCount = 0;       // track how many videos we've rendered

/* ====== UNLOCK SOUND ON TOUCH ====== */
document.addEventListener("touchstart", unlockSound, {once: true});
document.addEventListener("click", unlockSound, {once: true});

function unlockSound(){
document.querySelectorAll("iframe").forEach(frame => {
// remove mute param and ensure autoplay
let src = frame.src;
if (src.includes("mute=1")) {
frame.src = src.replace("mute=1", "mute=0");
}
});
}

/* ====== FETCH VIDEOS FROM YOUTUBE ====== */
async function fetchVideos(){
// show loading text
document.getElementById("loading").innerText = "Fetching latest videos...";

for(let channel of channels){
let url = `https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&channelId=${channel}&part=snippet,id&order=date&maxResults=6&type=video`;

try {
let res = await fetch(url);
let data = await res.json();

if (data.error) {
console.warn(`Channel ${channel} error:`, data.error.message);
continue; // skip if quota or invalid channel
}

if (data.items && data.items.length > 0) {
data.items.forEach(v => {
if(v.id && v.id.videoId){
videoPool.push(v.id.videoId);
}
});
}
} catch (e) {
console.warn("fetch error for channel", channel, e);
}
}

document.getElementById("loading").innerText = "Loading more videos...";
createInitialVideos();
}

/* ====== CREATE VIDEO CARD ====== */
function createVideo(id){
let div = document.createElement("div");
div.className = "video";

// Use embed with JS API enabled, autoplay=1, mute=1 initially (will unmute on first touch)
div.innerHTML = `
<iframe
src="https://www.youtube.com/embed/${id}?enablejsapi=1&autoplay=1&mute=1&controls=0&playsinline=1&loop=1&playlist=${id}"
allow="autoplay; fullscreen">
</iframe>
`;

feed.appendChild(div);
observer.observe(div);
loadedCount++;
}

/* ====== INITIAL VIDEOS ====== */
function createInitialVideos(){
// load first 6 from pool (or less if pool smaller)
let initialCount = Math.min(6, videoPool.length);
for(let i = 0; i < initialCount; i++){
createVideo(videoPool[i]);
}
// if pool smaller than 6, we might want to trigger more loading, but for now it's fine
}

/* ====== LOAD MORE VIDEOS ====== */
function loadMore(){
if(loading) return;
if (loadedCount >= videoPool.length) {
// optionally fetch more from channels? but we already pre-filled 6 per channel (36 videos)
// could implement pagination later, but for now just show "end"
document.getElementById("loading").innerText = "No more videos";
return;
}

loading = true;
document.getElementById("loading").innerText = "Loading more...";

// load next batch (e.g., next 3 videos)
let nextBatch = Math.min(loadedCount + 3, videoPool.length);
for (let i = loadedCount; i < nextBatch; i++) {
createVideo(videoPool[i]);
}

loading = false;
if (loadedCount >= videoPool.length) {
document.getElementById("loading").innerText = "End of feed";
} else {
document.getElementById("loading").innerText = "Scroll for more";
}
}

/* ====== AUTOPLAY ENGINE ====== */
let observer = new IntersectionObserver(entries => {
entries.forEach(entry => {
let frame = entry.target.querySelector("iframe");
if(!frame) return;

if(entry.isIntersecting){
// play video when visible
frame.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*');
} else {
// pause when not visible
frame.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*');
}
});
}, {threshold: 0.7});

/* ====== INFINITE SCROLL ====== */
window.addEventListener("scroll", () => {
if(window.innerHeight + window.scrollY >= document.body.offsetHeight - 600){
loadMore();
}
});

/* ====== START ====== */
fetchVideos();
</script>
</body>
</html>

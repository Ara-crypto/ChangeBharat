<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Goa Shorts</title>

<style>

body{
margin:0;
background:black;
overflow-y:scroll;
scroll-snap-type:y mandatory;
height:100vh;
}

.video{
height:100vh;
scroll-snap-align:start;
position:relative;
}

iframe{
width:100%;
height:100%;
border:none;
}

.tap{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:black;
color:white;
display:flex;
justify-content:center;
align-items:center;
font-size:22px;
z-index:1000;
}

</style>

</head>

<body>

<div class="tap" id="tap">Tap to start</div>

<div id="feed"></div>

<script>

const videos=[

"z_8Gzjx3s_Q",
"ScMzIvxBSi4",
"aqz-KE-bpKQ",
"dQw4w9WgXcQ",
"3fumBcKC6RE"

]

let sound=false

let feed=document.getElementById("feed")

videos.forEach((id,i)=>{

feed.innerHTML+=`

<div class="video">

<iframe
id="v${i}"
src="https://www.youtube.com/embed/${id}?enablejsapi=1&autoplay=1&mute=1&controls=0&loop=1&playlist=${id}&modestbranding=1"
allow="autoplay">
</iframe>

</div>

`

})

document.getElementById("tap").onclick=function(){

sound=true

this.style.display="none"

videos.forEach((v,i)=>{

let frame=document.getElementById("v"+i)

frame.src=frame.src.replace("mute=1","mute=0")

})

}

let observer=new IntersectionObserver(entries=>{

entries.forEach(entry=>{

let frame=entry.target.querySelector("iframe")

if(entry.isIntersecting){

frame.contentWindow.postMessage('{"event":"command","func":"playVideo","args":""}', '*')

}else{

frame.contentWindow.postMessage('{"event":"command","func":"pauseVideo","args":""}', '*')

}

})

},{threshold:0.6})

document.querySelectorAll(".video").forEach(v=>observer.observe(v))

</script>

</body>
</html>

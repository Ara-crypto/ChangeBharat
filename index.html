<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Goa Social · Tropical Feed</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}

body{
background:#000;
color:#fff;
line-height:1.4;
padding-bottom:70px;
min-height:100vh;
}


/* HEADER */

.app-header{
background:rgba(0,0,0,0.85);
backdrop-filter:blur(12px);
padding:12px 18px;
display:flex;
align-items:center;
justify-content:space-between;
border-bottom:1px solid rgba(0,198,162,0.35);
box-shadow:0 8px 20px rgba(0,198,162,0.18);
}

.logo-container{
display:flex;
align-items:center;
gap:12px;
}


/* FIXED LOGO CROP */

.logo-crop{
width:52px;
height:52px;
border-radius:16px;
overflow:hidden;
background:linear-gradient(135deg,#00C6A2,#3ED8C5);
box-shadow:0 10px 0 #0B8F86,0 15px 25px rgba(0,198,162,0.35);
flex-shrink:0;
}

.logo-crop img{
width:100%;
height:100%;
object-fit:cover;
object-position:50% 48%;
transform:scale(1.65);
display:block;
}


.logo-text{
font-size:1.8rem;
font-weight:700;
letter-spacing:-0.5px;
background:linear-gradient(135deg,#00C6A2,#3ED8C5);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.header-actions{
display:flex;
gap:18px;
color:#3ED8C5;
}

.header-actions i{
font-size:1.3rem;
}


/* STORIES */

.stories-section{
padding:16px 16px 12px 16px;
background:rgba(20,20,20,0.8);
margin:8px 0;
}

.section-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:16px;
padding:0 4px;
}

.section-header h3{
font-size:1.1rem;
font-weight:600;
}

.section-header a{
color:#00C6A2;
font-size:0.9rem;
text-decoration:none;
}

.stories-scroll{
display:flex;
gap:20px;
overflow-x:auto;
scrollbar-width:none;
padding:4px 4px 8px 4px;
}

.stories-scroll::-webkit-scrollbar{
display:none;
}

.story-item{
min-width:80px;
text-align:center;
}

.story-avatar{
width:80px;
height:80px;
border-radius:50%;
background:linear-gradient(145deg,#00C6A2,#3ED8C5);
padding:3px;
margin-bottom:8px;
box-shadow:0 8px 0 #0B8F86,0 12px 20px rgba(0,198,162,0.35);
}

.story-avatar-inner{
width:100%;
height:100%;
border-radius:50%;
background:#1a1a1a;
display:flex;
align-items:center;
justify-content:center;
font-size:2rem;
color:#00C6A2;
overflow:hidden;
}

.story-label{
font-size:0.8rem;
color:#ccc;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}


/* CHIPS */

.categories-section{
padding:8px 16px 16px 16px;
}

.chips-scroll{
display:flex;
gap:12px;
overflow-x:auto;
}

.chip{
background:#1a1a1a;
color:#fff;
padding:8px 20px;
border-radius:40px;
font-size:0.9rem;
white-space:nowrap;
border:1px solid rgba(0,198,162,0.3);
}

.chip.active{
background:linear-gradient(145deg,#00C6A2,#3ED8C5);
color:#000;
font-weight:600;
border:none;
}


/* FEED */

.feed-container{
max-width:600px;
margin:0 auto;
padding-bottom:20px;
}

.feed-card{
background:#111;
border-radius:28px;
margin:16px 16px 20px 16px;
overflow:hidden;
box-shadow:0 15px 25px -8px rgba(0,0,0,0.8),0 0 0 1px rgba(0,198,162,0.2) inset;
border:1px solid rgba(0,198,162,0.1);
}

.card-header{
display:flex;
align-items:center;
padding:16px;
gap:12px;
}

.channel-icon{
width:44px;
height:44px;
border-radius:16px;
background:linear-gradient(145deg,#222,#1a1a1a);
display:flex;
align-items:center;
justify-content:center;
font-size:1.2rem;
color:#00C6A2;
box-shadow:0 6px 0 #0a0a0a;
}

.channel-info{
flex:1;
}

.channel-name{
font-weight:600;
font-size:1rem;
}

.post-time{
font-size:0.7rem;
color:#888;
margin-top:2px;
}

.card-header i{
color:#00C6A2;
font-size:1.2rem;
}

.card-title{
padding:0 16px 12px 16px;
font-size:1.1rem;
font-weight:600;
}

.card-description{
padding:0 16px 16px 16px;
color:#bbb;
font-size:0.9rem;
line-height:1.5;
}

.image-placeholder{
width:100%;
height:200px;
background:linear-gradient(145deg,#222,#1a1a1a);
display:flex;
align-items:center;
justify-content:center;
color:#00C6A2;
font-size:3rem;
}

.card-footer{
padding:16px;
display:flex;
gap:24px;
border-top:1px solid rgba(0,198,162,0.15);
margin-top:8px;
}

.footer-item{
display:flex;
align-items:center;
gap:6px;
color:#888;
font-size:0.9rem;
}

.footer-item i.fa-heart{
color:#FF6B6B;
}

.footer-item i.fa-comment{
color:#00C6A2;
}


/* NAVBAR */

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
background:rgba(0,0,0,0.95);
backdrop-filter:blur(18px);
border-top:1px solid rgba(0,198,162,0.2);
display:flex;
justify-content:space-around;
align-items:center;
padding:8px 10px 12px 10px;
z-index:1000;
box-shadow:0 -8px 20px rgba(0,198,162,0.12);
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
color:#666;
font-size:0.7rem;
padding:4px 12px;
border-radius:30px;
background:transparent;
border:none;
cursor:pointer;
}

.nav-item i{
font-size:1.5rem;
margin-bottom:2px;
}

.nav-item.active{
color:#00C6A2;
background:rgba(0,198,162,0.1);
}

</style>
</head>

<body>


<header class="app-header">
<div class="logo-container">

<div class="logo-crop">
<img src="https://i.imgur.com/bk1xoE8.jpeg">
</div>

<span class="logo-text">Goa Social</span>

</div>

<div class="header-actions">
<i class="fas fa-search"></i>
<i class="fas fa-bell"></i>
</div>
</header>


<!-- REST OF YOUR PAGE REMAINS IDENTICAL -->


</body>
</html>

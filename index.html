<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Channel ID Extractor</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
padding:40px;
}

textarea{
width:100%;
height:260px;
background:#222;
color:white;
border:none;
padding:10px;
}

button{
margin-top:15px;
padding:12px 20px;
font-size:16px;
background:#1877f2;
border:none;
color:white;
cursor:pointer;
}

pre{
background:#222;
padding:20px;
margin-top:20px;
white-space:pre-wrap;
}

</style>
</head>

<body>

<h2>Goa Social Channel ID Extractor</h2>

<textarea id="links">

https://youtube.com/@adventuregoadk
https://youtube.com/@rdxgoa
https://youtube.com/@goa365tv
https://youtube.com/@prudentmediagoatv
https://youtube.com/@goachanneluk
https://youtube.com/@rakshandasrecipes8691
https://youtube.com/@bushu_talkiesdollmmaa
https://youtube.com/@_we_raj_
https://youtube.com/@goaplatform
https://youtube.com/@hellopeoplewithshaneli
https://youtube.com/@swancyfernandes
https://youtube.com/@glendyfernandes10
https://youtube.com/@mosesjsaldanha
https://youtube.com/@lesleyingoa
https://youtube.com/@teranellefernandes

</textarea>

<br>
<button onclick="extract()">Get Channel IDs</button>

<pre id="output"></pre>

<script>

async function extract(){

const text=document.getElementById("links").value;
const links=text.split("\n").filter(l=>l.trim());

let ids=[];

for(const link of links){

try{

const res=await fetch(link);
const html=await res.text();

const match=html.match(/"channelId":"(UC[a-zA-Z0-9_-]+)"/);

if(match){
ids.push(match[1]);
}

}catch(e){}

}

document.getElementById("output").textContent=
`const CHANNELS = [
"${ids.join('",\n"')}"
];`;

}

</script>

</body>
</html>

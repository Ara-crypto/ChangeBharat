<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Goa Social Test</title>

<style>

body{
background:#000;
color:white;
font-family:Arial;
padding:20px;
}

.channel{
margin-top:40px;
font-size:20px;
color:#ff7b42;
}

.card{
background:#111;
border-radius:10px;
margin-bottom:20px;
overflow:hidden;
}

img{
width:100%;
display:block;
}

</style>

</head>
<body>

<h2>Goa Channels Test Feed</h2>

<div id="feed"></div>

<script>

const API_KEY = "AIzaSyDGHXHuPiHAfJGin_c2-LF4FZ5IBMYLNK4"

/* CHANNEL NAMES */
const channels = [

"rdxgoa",
"alertgoans",
"ingoanews",
"goa365tv",
"dainikgomantaktv"

]

async function loadFeed(){

let container = document.getElementById("feed")

for(let name of channels){

/* STEP 1: FIND CHANNEL ID */

let searchUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${name}&type=channel&maxResults=1&key=${API_KEY}`

let res = await fetch(searchUrl)
let data = await res.json()

if(!data.items.length) continue

let channelId = data.items[0].id.channelId
let channelTitle = data.items[0].snippet.title

container.innerHTML += `<div class="channel">${channelTitle}</div>`

/* STEP 2: GET LATEST VIDEOS */

let videoUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&channelId=${channelId}&maxResults=4&order=date&type=video&key=${API_KEY}`

let res2 = await fetch(videoUrl)
let data2 = await res2.json()

data2.items.forEach(video=>{

let id = video.id.videoId
let thumb = video.snippet.thumbnails.high.url
let title = video.snippet.title

container.innerHTML += `

<div class="card">

<div onclick="playVideo('${id}',this)">

<img src="${thumb}">

</div>

<div style="padding:10px">${title}</div>

</div>

`

})

}

}

function playVideo(id,el){

el.innerHTML = `

<iframe
width="100%"
height="220"
src="https://www.youtube.com/embed/${id}?autoplay=1"
frameborder="0"
allowfullscreen>
</iframe>

`

}

loadFeed()

</script>

</body>
</html>
